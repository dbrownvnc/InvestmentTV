<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자는인생TV | 5월 21일 멤버온리 퀴즈</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #fafafa;
    --text: #1a1a1a;
    --text2: #777777;
    --red: #e11d48;
    --red2: #f43f5e;
    --border: #e5e5e5;
    --green: #16a34a;
    --green-bg: #dcfce7;
    --red-bg: #fee2e2;
    --orange: #ea580c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg2);
    color: var(--text);
    font-size: 15px;
    line-height: 1.7;
    padding-bottom: 60px;
  }

  /* STICKY SCORE BAR */
  .score-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--text);
    color: #fff;
    padding: 12px 20px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .score-bar-inner {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex-wrap: wrap;
  }
  .score-item {
    text-align: center;
  }
  .score-val {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--red2);
    display: block;
    line-height: 1;
  }
  .score-lbl {
    font-size: 10px;
    color: #aaa;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .progress-wrap {
    flex: 1;
    min-width: 120px;
  }
  .progress-bg {
    background: #333;
    border-radius: 4px;
    height: 8px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    background: var(--red);
    transition: width 0.5s ease, background 0.4s ease;
    width: 0%;
  }
  .progress-pct {
    font-size: 12px;
    color: #ccc;
    margin-top: 3px;
    text-align: right;
  }

  /* HEADER */
  .quiz-header {
    background: var(--text);
    color: #fff;
    padding: 28px 20px 24px;
    text-align: center;
  }
  .quiz-header .eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--red2);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .quiz-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 900;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .quiz-header p {
    font-size: 13px;
    color: #aaa;
  }
  .quiz-header .badge-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
  }
  .badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 2px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .badge-mc { background: #dbeafe; color: #1d4ed8; }
  .badge-sa { background: #fef9c3; color: #854d0e; }
  .badge-ox { background: var(--red-bg); color: #b91c1c; }

  /* MAIN */
  .quiz-body {
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 16px;
  }

  /* QUIZ CARD */
  .quiz-card {
    background: #fff;
    border: 1px solid var(--border);
    border-top: 3px solid var(--border);
    padding: 22px;
    margin-bottom: 20px;
    transition: border-top-color 0.3s;
  }
  .quiz-card.answered-correct { border-top-color: var(--green); }
  .quiz-card.answered-wrong { border-top-color: var(--red); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .q-num {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--text2);
    min-width: 28px;
  }
  .diff-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 2px;
    letter-spacing: 0.5px;
  }
  .diff-easy { background: #dcfce7; color: #15803d; }
  .diff-medium { background: #fef9c3; color: #854d0e; }
  .diff-hard { background: #fee2e2; color: #b91c1c; }
  .type-badge {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 2px;
    font-weight: 700;
  }
  .type-mc { background: #dbeafe; color: #1d4ed8; }
  .type-sa { background: #fef3c7; color: #92400e; }
  .type-ox { background: #ede9fe; color: #6d28d9; }

  .q-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.55;
  }

  /* OPTIONS */
  .options {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .opt-btn {
    width: 100%;
    text-align: left;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .opt-btn:hover:not(:disabled) {
    border-color: var(--red);
    background: #fff5f7;
  }
  .opt-btn:disabled { cursor: default; }
  .opt-btn .opt-idx {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    color: var(--text2);
    transition: all 0.2s;
  }
  .opt-btn.correct {
    background: var(--green-bg);
    border-color: var(--green);
    color: #166534;
  }
  .opt-btn.correct .opt-idx {
    background: var(--green);
    color: #fff;
  }
  .opt-btn.wrong {
    background: var(--red-bg);
    border-color: var(--red);
    color: #991b1b;
  }
  .opt-btn.wrong .opt-idx {
    background: var(--red);
    color: #fff;
  }
  .result-badge {
    margin-left: auto;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 2px;
    white-space: nowrap;
  }
  .badge-correct-tag { background: var(--green); color: #fff; }
  .badge-wrong-tag { background: var(--red); color: #fff; }

  /* OX BUTTONS */
  .ox-wrap {
    display: flex;
    gap: 12px;
  }
  .ox-btn {
    flex: 1;
    padding: 16px;
    font-size: 28px;
    font-weight: 700;
    border: 2px solid var(--border);
    background: var(--bg2);
    cursor: pointer;
    transition: all 0.2s;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 4px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .ox-btn span { font-size: 12px; font-weight: 700; color: var(--text2); }
  .ox-btn.o-btn:hover:not(:disabled) { border-color: var(--green); background: #f0fdf4; }
  .ox-btn.x-btn:hover:not(:disabled) { border-color: var(--red); background: var(--red-bg); }
  .ox-btn:disabled { cursor: default; }
  .ox-btn.correct { background: var(--green-bg); border-color: var(--green); }
  .ox-btn.wrong { background: var(--red-bg); border-color: var(--red); }
  .ox-btn.highlight-correct { background: var(--green-bg); border-color: var(--green); }

  /* SHORT ANSWER */
  .sa-wrap {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .sa-input {
    flex: 1;
    min-width: 140px;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg2);
    outline: none;
    transition: border-color 0.2s;
  }
  .sa-input:focus { border-color: var(--red); }
  .sa-input:disabled { background: #f0f0f0; }
  .sa-submit-btn {
    padding: 10px 18px;
    background: var(--red);
    color: #fff;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .sa-submit-btn:hover:not(:disabled) { background: var(--red2); }
  .sa-submit-btn:disabled { background: #ccc; cursor: default; }
  .sa-result {
    width: 100%;
    margin-top: 8px;
    font-size: 14px;
    font-weight: 700;
    display: none;
  }
  .sa-result.show { display: block; }
  .sa-correct-ans {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }

  /* EXPLANATION */
  .explanation {
    background: #fffbf2;
    border-left: 4px solid #f59e0b;
    padding: 14px 16px;
    margin-top: 16px;
    display: none;
    font-size: 13px;
    line-height: 1.6;
    border-radius: 0 2px 2px 0;
  }
  .explanation.show { display: block; }
  .explanation .exp-title {
    font-weight: 700;
    color: #92400e;
    margin-bottom: 6px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .explanation .exp-text { color: var(--text); }
  .explanation .exp-source {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text2);
    border-top: 1px solid #fde68a;
    padding-top: 6px;
  }

  /* RESULT MODAL */
  .result-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .result-overlay.show { display: flex; }
  .result-card {
    background: #fff;
    max-width: 420px;
    width: 100%;
    padding: 36px 28px;
    text-align: center;
    position: relative;
  }
  .result-icon { font-size: 56px; margin-bottom: 12px; }
  .result-grade {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    font-weight: 900;
    color: var(--red);
    line-height: 1;
    margin-bottom: 8px;
  }
  .result-score-text {
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .result-msg {
    font-size: 14px;
    color: var(--text2);
    margin-bottom: 24px;
    line-height: 1.6;
  }
  .retry-btn {
    padding: 14px 32px;
    background: var(--red);
    color: #fff;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: background 0.2s;
  }
  .retry-btn:hover { background: var(--red2); }

  @media (max-width: 400px) {
    .quiz-header h1 { font-size: 22px; }
    .score-val { font-size: 18px; }
    .ox-btn { padding: 12px; font-size: 24px; }
  }
</style>
</head>

      '9번 중 8번 금리 인하'
    ],
    answer: 1,
    explanation: '"2차 세계대전 이후 신규 의장 취임 후 첫 단기 금리 결정 9권 중 7권이 인상입니다"라고 언급되었습니다. 새 의장은 자신의 존재감 증명을 위해 초기에 강경(Hawkish)하게 가는 경향이 있다는 역사적 패턴입니다.',
    source: '자막: "2차 세계대전 이후 신규 의장 취임 후 첫 단기 금리 결정 9권 중 7권이 인상입니다"'

    explanation: '"참가비는 작년에는 6만 원 했는데 올해는 여러 가지 비용이 늘어나서 7만 원 정도"라고 언급되었습니다. 200명을 수용하는 장소 임대비 증가와 고급 만찬 도시락 제공 등으로 인해 작년 6만 원에서 7만 원으로 올랐습니다.',
    source: '자막: "참가비는 작년에는 6만 원 했는데 올해는 여러 가지 비용이 늘어나서 7만 원 정도"'

// ===== STATE =====
let state = { solved: 0, correct: 0 };

// ===== RENDER =====
function renderQuiz() {
  const body = document.getElementById('quizBody');
  body.innerHTML = '';
  state = { solved: 0, correct: 0 };
  updateScoreBar();

  QUIZ_DATA.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = 'card-' + q.id;

    const diffLabel = { easy: '쉬움', medium: '보통', hard: '어려움' }[q.difficulty];
    const diffClass = { easy: 'diff-easy', medium: 'diff-medium', hard: 'diff-hard' }[q.difficulty];
    const typeLabel = { mc: '객관식', sa: '단답형', ox: 'OX' }[q.type];
    const typeClass = { mc: 'type-mc', sa: 'type-sa', ox: 'type-ox' }[q.type];

    let inputHTML = '';
    if (q.type === 'mc') {
      inputHTML = `<div class="options" id="opts-${q.id}">` +
        q.options.map((opt, i) =>
          `<button class="opt-btn" id="opt-${q.id}-${i}" onclick="answerMC(${q.id}, ${i})">
            <span class="opt-idx">${['①','②','③','④'][i]}</span>
            <span>${opt}</span>
          </button>`
        ).join('') +
        `</div>`;
    } else if (q.type === 'ox') {
      inputHTML = `<div class="ox-wrap" id="opts-${q.id}">
        <button class="ox-btn o-btn" id="opt-${q.id}-O" onclick="answerOX(${q.id}, 'O')">
          ⭕ <span>O (맞다)</span>
        </button>
        <button class="ox-btn x-btn" id="opt-${q.id}-X" onclick="answerOX(${q.id}, 'X')">
          ❌ <span>X (틀리다)</span>
        </button>
      </div>`;
    } else {
      inputHTML = `<div class="sa-wrap" id="opts-${q.id}">
        <input type="text" class="sa-input" id="sa-input-${q.id}" placeholder="정답을 입력하세요" 
          onkeydown="if(event.key==='Enter') submitSA(${q.id})">
        <button class="sa-submit-btn" id="sa-btn-${q.id}" onclick="submitSA(${q.id})">제출</button>
      </div>
      <div class="sa-result" id="sa-result-${q.id}"></div>`;
    }

    card.innerHTML = `
      <div class="card-meta">
        <span class="q-num">Q${idx + 1}.</span>
        <span class="diff-badge ${diffClass}">${diffLabel}</span>
        <span class="type-badge ${typeClass}">${typeLabel}</span>
      </div>
      <div class="q-text">${q.question}</div>
      ${inputHTML}
      <div class="explanation" id="exp-${q.id}">
        <div class="exp-title">📖 해설</div>
        <div class="exp-text">${q.explanation}</div>
        <div class="exp-source">📌 근거: ${q.source}</div>
      </div>
    `;
    body.appendChild(card);
  });
}

// ===== ANSWER HANDLERS =====
function answerMC(qId, selectedIdx) {
  const q = QUIZ_DATA.find(x => x.id === qId);
  const allOpts = document.querySelectorAll(`#opts-${qId} .opt-btn`);
  allOpts.forEach(btn => btn.disabled = true);

  const isCorrect = selectedIdx === q.answer;
  const selectedBtn = document.getElementById(`opt-${qId}-${selectedIdx}`);
  const correctBtn = document.getElementById(`opt-${qId}-${q.answer}`);

  if (isCorrect) {
    selectedBtn.classList.add('correct');
    selectedBtn.querySelector('.opt-idx').textContent = '✓';
    const badge = document.createElement('span');
    badge.className = 'result-badge badge-correct-tag';
    badge.textContent = '✓ 정답!';
    selectedBtn.appendChild(badge);
  } else {
    selectedBtn.classList.add('wrong');
    selectedBtn.querySelector('.opt-idx').textContent = '✗';
    const badge = document.createElement('span');
    badge.className = 'result-badge badge-wrong-tag';
    badge.textContent = '✗ 오답';
    selectedBtn.appendChild(badge);
    correctBtn.classList.add('correct');
    correctBtn.querySelector('.opt-idx').textContent = '✓';
    const cbadge = document.createElement('span');
    cbadge.className = 'result-badge badge-correct-tag';
    cbadge.textContent = '✓ 정답';
    correctBtn.appendChild(cbadge);
  }

  recordAnswer(qId, isCorrect);
}

function answerOX(qId, selected) {
  const q = QUIZ_DATA.find(x => x.id === qId);
  const oBtn = document.getElementById(`opt-${qId}-O`);
  const xBtn = document.getElementById(`opt-${qId}-X`);
  oBtn.disabled = true;
  xBtn.disabled = true;

  const isCorrect = selected === q.answer;
  const selectedBtn = selected === 'O' ? oBtn : xBtn;
  const correctBtn = q.answer === 'O' ? oBtn : xBtn;

  if (isCorrect) {
    selectedBtn.classList.add('correct');
  } else {
    selectedBtn.classList.add('wrong');
    correctBtn.classList.add('highlight-correct');
  }

  recordAnswer(qId, isCorrect);
}

function submitSA(qId) {
  const q = QUIZ_DATA.find(x => x.id === qId);
  const input = document.getElementById(`sa-input-${qId}`);
  const btn = document.getElementById(`sa-btn-${qId}`);
  const resultDiv = document.getElementById(`sa-result-${qId}`);
  const val = input.value.trim();

  if (!val) { input.focus(); return; }

  input.disabled = true;
  btn.disabled = true;

  const normalize = s => s.replace(/\s/g,'').toLowerCase();
  const allAnswers = [q.answer, ...(q.answerAlts || [])];
  const isCorrect = allAnswers.some(a => normalize(val) === normalize(a));

  resultDiv.classList.add('show');
  if (isCorrect) {
    resultDiv.innerHTML = `<span style="color:var(--green);font-weight:700;">✓ 정답입니다!</span>`;
  } else {
    resultDiv.innerHTML = `<span style="color:var(--red);font-weight:700;">✗ 오답입니다.</span><div class="sa-correct-ans">정답: <strong>${q.answer}</strong></div>`;
  }

  recordAnswer(qId, isCorrect);
}

function recordAnswer(qId, isCorrect) {
  state.solved++;
  if (isCorrect) state.correct++;

  const card = document.getElementById(`card-${qId}`);
  card.classList.add(isCorrect ? 'answered-correct' : 'answered-wrong');

  document.getElementById(`exp-${qId}`).classList.add('show');
  updateScoreBar();

  if (state.solved === QUIZ_DATA.length) {
    setTimeout(showResult, 600);
  }
}

// ===== SCORE BAR =====
function updateScoreBar() {
  document.getElementById('solvedCount').textContent = state.solved;
  document.getElementById('correctCount').textContent = state.correct;
  const pct = state.solved > 0 ? Math.round((state.correct / state.solved) * 100) : 0;
  const fill = document.getElementById('progressFill');
  fill.style.width = pct + '%';
  if (pct < 40) fill.style.background = '#dc2626';
  else if (pct < 70) fill.style.background = '#ea580c';
  else fill.style.background = '#16a34a';
  document.getElementById('progressPct').textContent = '정답률 ' + pct + '%';
}

// ===== RESULT =====
function showResult() {
  const score = state.correct;
  let grade, icon, msg;
  if (score === 10) { grade = 'A+'; icon = '🏆'; msg = '완벽합니다! 방송을 정말 꼼꼼히 시청하셨네요. 투자의 고수 입문!'; }
  else if (score >= 8) { grade = 'A'; icon = '🥇'; msg = '훌륭합니다! 핵심 내용을 대부분 이해하셨습니다.'; }
  else if (score >= 6) { grade = 'B'; icon = '👍'; msg = '좋습니다! 주요 내용은 파악하셨네요. 한 번 더 복습해보세요.'; }
  else if (score >= 4) { grade = 'C'; icon = '📚'; msg = '조금 더 집중해서 방송을 다시 한번 들어보시길 권장합니다.'; }
  else { grade = 'D'; icon = '💪'; msg = '방송을 처음부터 다시 꼼꼼히 들어보세요. 화이팅!'; }

  document.getElementById('resultIcon').textContent = icon;
  document.getElementById('resultGrade').textContent = grade;
  document.getElementById('resultScoreText').textContent = score + '점 / 10점';
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultOverlay').classList.add('show');
}

function retryQuiz() {
  document.getElementById('resultOverlay').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(renderQuiz, 400);
}

// ===== INIT =====
renderQuiz();
</script>
</body>
</html>
