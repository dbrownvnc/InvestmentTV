<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시장의 과잉반응에 여유로워야 되는 시장 — 인터랙티브 시험문제</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff; --bg-sub:#fafafa; --text:#1a1a1a; --text-sub:#777777;
  --accent:#e11d48; --accent2:#f43f5e; --line:#e5e5e5;
  --ok:#16a34a; --ok-bg:#dcfce7; --no:#dc2626; --no-bg:#fee2e2;
  --warn:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  background:var(--bg);color:var(--text);
  font-family:'Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;
  line-height:1.75;font-size:16px;-webkit-text-size-adjust:100%;
}
.wrap{max-width:680px;margin:0 auto;padding:0 18px 80px}

/* 헤더 */
header{border-bottom:3px solid var(--text);padding:30px 0 16px;margin-bottom:0}
header .kicker{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--accent);font-weight:700}
header h1{font-family:'Playfair Display',serif;font-size:29px;line-height:1.25;font-weight:900;letter-spacing:-.4px;margin:10px 0 8px}
header .sub{font-size:13px;color:var(--text-sub);line-height:1.7}

/* 스티키 채점판 */
.board{
  position:sticky;top:0;z-index:50;background:#fff;
  border-bottom:2px solid var(--text);padding:11px 0 10px;margin-bottom:26px;
}
.board-in{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:nowrap}
.bstat{text-align:center;flex:1;min-width:0}
.bstat .l{font-size:9.5px;letter-spacing:.13em;color:var(--text-sub);white-space:nowrap}
.bstat .n{font-family:'Playfair Display',serif;font-size:21px;font-weight:900;line-height:1.15;letter-spacing:-.3px}
.bstat .n .s{font-size:12px;color:var(--text-sub);font-weight:700}
.bstat.acc .n{color:var(--accent)}
.bar{height:5px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:9px}
.bar i{display:block;height:100%;width:0%;background:var(--no);transition:width .45s ease, background .45s ease;border-radius:3px}

/* 문제 카드 */
.q{border:1px solid var(--line);border-radius:4px;padding:20px 17px;margin:0 0 20px;background:#fff}
.q.done{border-color:var(--text)}
.q-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.q-no{
  font-family:'Playfair Display',serif;font-size:13px;font-weight:900;
  background:var(--text);color:#fff;padding:3px 10px;border-radius:2px;letter-spacing:.06em;
}
.badge{font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:2px;letter-spacing:.06em}
.badge.easy{background:#dcfce7;color:#15803d}
.badge.mid{background:#fef3c7;color:#b45309}
.badge.hard{background:#fee2e2;color:#b91c1c}
.badge.type{background:var(--bg-sub);color:var(--text-sub);border:1px solid var(--line)}
.q-text{font-size:16px;font-weight:500;line-height:1.7;margin-bottom:16px}

/* 보기 */
.opts{display:flex;flex-direction:column;gap:8px}
.opt{
  display:flex;align-items:flex-start;gap:10px;width:100%;text-align:left;
  font-family:inherit;font-size:14.5px;line-height:1.6;color:var(--text);
  background:var(--bg-sub);border:1px solid var(--line);border-radius:3px;
  padding:12px 13px;cursor:pointer;transition:.15s;position:relative;
}
.opt:hover:not(:disabled){border-color:var(--accent);background:#fff1f2}
.opt:disabled{cursor:default}
.opt .mk{
  flex-shrink:0;width:22px;height:22px;border-radius:50%;
  border:2px solid var(--text-sub);display:flex;align-items:center;justify-content:center;
  font-size:11.5px;font-weight:700;color:var(--text-sub);line-height:1;
}
.opt.correct{background:var(--ok-bg);border-color:var(--ok)}
.opt.correct .mk{background:var(--ok);border-color:var(--ok);color:#fff}
.opt.wrong{background:var(--no-bg);border-color:var(--no)}
.opt.wrong .mk{background:var(--no);border-color:var(--no);color:#fff}
.tagres{
  margin-left:auto;flex-shrink:0;font-size:10.5px;font-weight:700;
  padding:2px 8px;border-radius:2px;white-space:nowrap;align-self:center;
}
.tagres.o{background:var(--ok);color:#fff}
.tagres.x{background:var(--no);color:#fff}

/* OX */
.ox{display:flex;gap:10px}
.ox .opt{justify-content:center;align-items:center;font-family:'Playfair Display',serif;font-size:26px;font-weight:900;padding:16px 10px}
.ox .opt .mk{display:none}
.ox .opt .tagres{margin-left:8px;font-family:'Noto Sans KR',sans-serif}

/* 단답형 */
.sa{display:flex;gap:8px;align-items:stretch}
.sa input{
  flex:1;min-width:0;padding:12px 13px;font-size:15px;font-family:inherit;
  border:1px solid var(--line);border-radius:3px;background:var(--bg-sub);color:var(--text);
}
.sa input:focus{outline:2px solid var(--accent);outline-offset:1px}
.sa input:disabled{opacity:.75}
.sa button{
  font-family:inherit;font-size:14px;font-weight:700;padding:0 18px;cursor:pointer;
  background:var(--text);color:#fff;border:1px solid var(--text);border-radius:3px;transition:.15s;white-space:nowrap;
}
.sa button:hover:not(:disabled){background:var(--accent);border-color:var(--accent)}
.sa button:disabled{opacity:.45;cursor:default}
.sa-res{margin-top:10px;font-size:14px;font-weight:700;display:none}
.sa-res.show{display:block}
.sa-res.o{color:var(--ok)}
.sa-res.x{color:var(--no)}
.hint{font-size:11.5px;color:var(--text-sub);margin-top:7px}

/* 해설 */
.exp{
  display:none;margin-top:14px;padding:14px;border-radius:3px;
  background:var(--bg-sub);border-left:4px solid var(--accent);font-size:13.5px;line-height:1.75;
}
.exp.show{display:block;animation:slide .34s ease}
@keyframes slide{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.exp .eh{
  font-size:11px;letter-spacing:.14em;color:var(--accent);font-weight:700;
  margin-bottom:6px;text-transform:uppercase;
}
.exp .ans{font-weight:700;margin-bottom:6px}
.exp .src{
  margin-top:9px;padding-top:9px;border-top:1px dashed var(--line);
  font-size:12.5px;color:var(--text-sub);line-height:1.7;
}
.exp .src b{color:var(--text)}

/* 결과 */
.modal{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(26,26,26,.72);padding:22px;overflow-y:auto;
}
.modal.show{display:flex;align-items:center;justify-content:center}
.modal-in{
  background:#fff;border-radius:5px;max-width:400px;width:100%;
  padding:32px 24px;text-align:center;border-top:6px solid var(--accent);
  animation:pop .34s cubic-bezier(.2,.9,.3,1.2);
}
@keyframes pop{from{opacity:0;transform:scale(.9) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal .gr{font-family:'Playfair Display',serif;font-size:74px;font-weight:900;line-height:1;color:var(--accent);letter-spacing:-3px}
.modal .sc{font-size:15px;font-weight:700;margin-top:10px}
.modal .msg{font-size:14px;color:var(--text-sub);line-height:1.75;margin-top:12px}
.modal .brk{
  display:flex;justify-content:center;gap:0;margin-top:20px;
  border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 0;
}
.modal .brk div{flex:1;border-right:1px solid var(--line)}
.modal .brk div:last-child{border-right:none}
.modal .brk .l{font-size:10.5px;color:var(--text-sub);letter-spacing:.08em}
.modal .brk .n{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;line-height:1.2}
.modal .btns{display:flex;gap:8px;margin-top:20px}
.modal button{
  flex:1;font-family:inherit;font-size:14px;font-weight:700;padding:12px;cursor:pointer;
  border-radius:3px;transition:.15s;border:1px solid var(--text);
}
.modal .retry{background:var(--accent);border-color:var(--accent);color:#fff}
.modal .retry:hover{background:#be123c;border-color:#be123c}
.modal .close{background:#fff;color:var(--text)}
.modal .close:hover{background:var(--text);color:#fff}

footer{border-top:2px solid var(--text);margin-top:40px;padding-top:16px;font-size:11.5px;color:var(--text-sub);line-height:1.8}

@media (max-width:400px){
  .wrap{padding:0 13px 70px}
  header h1{font-size:24px}
  .q{padding:17px 13px}
  .bstat .n{font-size:18px}
  .bstat .l{font-size:9px}
  .sa{flex-direction:column}
  .sa button{padding:12px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <span class="kicker">Comprehension Check</span>
  <h1>시장의 과잉반응에<br>여유로워야 되는 시장</h1>
  <p class="sub">투자는인생TV 멤버온리 라이브 · 총 10문제<br>보기를 클릭하면 즉시 채점되고 해설이 자동으로 펼쳐집니다.</p>
</header>

<div class="board">
  <div class="board-in">
    <div class="bstat"><div class="l">푼 문제</div><div class="n"><span id="bSolved">0</span><span class="s"> / 10</span></div></div>
    <div class="bstat"><div class="l">맞힌 문제</div><div class="n"><span id="bCorrect">0</span></div></div>
    <div class="bstat acc"><div class="l">정답률</div><div class="n"><span id="bAcc">0</span><span class="s">%</span></div></div>
  </div>
  <div class="bar"><i id="bBar"></i></div>
</div>

<div id="quiz"></div>

<footer>
  본 문제는 방송 원본 자막과 발표 자료에 실제로 등장한 내용만으로 출제되었습니다.
  투자 권유가 아니며, 수치는 방송 기준입니다.
</footer>

</div>

<div class="modal" id="modal">
  <div class="modal-in">
    <div class="gr" id="mGrade">A</div>
    <div class="sc" id="mScore">10 / 10 정답</div>
    <div class="msg" id="mMsg"></div>
    <div class="brk">
      <div><div class="l">쉬움</div><div class="n" id="mEasy">0/3</div></div>
      <div><div class="l">보통</div><div class="n" id="mMid">0/5</div></div>
      <div><div class="l">어려움</div><div class="n" id="mHard">0/2</div></div>
    </div>
    <div class="btns">
      <button class="close" id="mClose">해설 다시 보기</button>
      <button class="retry" id="mRetry">다시 풀기</button>
    </div>
  </div>
</div>

var DIFF = {easy:{t:'쉬움',c:'easy'}, mid:{t:'보통',c:'mid'}, hard:{t:'어려움',c:'hard'}};
var TYPE = {mc:'객관식', ox:'OX', sa:'단답형'};
var TOTAL = QUIZ_DATA.length;

var state = { solved:0, correct:0, byDiff:{easy:0,mid:0,hard:0} };
var DIFF_TOTAL = {easy:0, mid:0, hard:0};
QUIZ_DATA.forEach(function(q){ DIFF_TOTAL[q.difficulty]++; });

var quizEl = document.getElementById('quiz');

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function render(){
  var html = '';
  QUIZ_DATA.forEach(function(q, idx){
    var d = DIFF[q.difficulty];
    html += '<div class="q" id="q'+q.id+'">';
    html += '<div class="q-top">';
    html += '<span class="q-no">Q'+(idx+1)+'</span>';
    html += '<span class="badge '+d.c+'">'+d.t+'</span>';
    html += '<span class="badge type">'+TYPE[q.type]+'</span>';
    html += '</div>';
    html += '<div class="q-text">'+q.question+'</div>';

    if(q.type === 'mc'){
      html += '<div class="opts" data-q="'+q.id+'">';
      q.options.forEach(function(o,i){
        html += '<button class="opt" data-q="'+q.id+'" data-i="'+i+'">'
             +  '<span class="mk">'+String.fromCharCode(9312+i)+'</span>'
             +  '<span class="ot">'+esc(o)+'</span></button>';
      });
      html += '</div>';
    } else if(q.type === 'ox'){
      html += '<div class="opts ox" data-q="'+q.id+'">';
      q.options.forEach(function(o,i){
        html += '<button class="opt" data-q="'+q.id+'" data-i="'+i+'">'
             +  '<span class="mk"></span><span class="ot">'+esc(o)+'</span></button>';
      });
      html += '</div>';
    } else {
      html += '<div class="sa">'
           +  '<input type="text" id="in'+q.id+'" placeholder="정답을 입력하세요" autocomplete="off" inputmode="decimal">'
           +  '<button class="sa-btn" data-q="'+q.id+'">제출</button></div>'
           +  '<div class="sa-res" id="res'+q.id+'"></div>'
           +  '<div class="hint">힌트: '+q.hint+'</div>';
    }

    html += '<div class="exp" id="exp'+q.id+'"></div>';
    html += '</div>';
  });
  quizEl.innerHTML = html;
  bind();
}

function normalize(s){
  return String(s).toLowerCase().replace(/[\s,%$원달러]/g,'').replace(/[()]/g,'').trim();
}

function showExp(q, isCorrect){
  var el = document.getElementById('exp'+q.id);
  var ansTxt;
  if(q.type === 'mc'){ ansTxt = String.fromCharCode(9312+q.answer)+' '+esc(q.options[q.answer]); }
  else if(q.type === 'ox'){ ansTxt = q.options[q.answer]; }
  else { ansTxt = q.display; }
  el.innerHTML = '<div class="eh">'+(isCorrect ? '✓ 정답' : '✗ 오답')+' · 해설</div>'
    + '<div class="ans">정답: '+ansTxt+'</div>'
    + '<div>'+q.explanation+'</div>'
    + '<div class="src"><b>원본 근거</b><br>'+q.source+'</div>';
  el.classList.add('show');
}

function grade(q, isCorrect){
  state.solved++;
  if(isCorrect){ state.correct++; state.byDiff[q.difficulty]++; }
  document.getElementById('q'+q.id).classList.add('done');
  updateBoard();
  showExp(q, isCorrect);
  if(state.solved === TOTAL){ setTimeout(showResult, 700); }
}

function bind(){
  document.querySelectorAll('.opt').forEach(function(btn){
    btn.addEventListener('click', function(){
      var qid = parseInt(btn.getAttribute('data-q'),10);
      var pick = parseInt(btn.getAttribute('data-i'),10);
      var q = QUIZ_DATA.filter(function(x){ return x.id === qid; })[0];
      var group = document.querySelectorAll('.opt[data-q="'+qid+'"]');
      if(group[0].disabled){ return; }
      var isCorrect = (pick === q.answer);
      group.forEach(function(b,i){
        b.disabled = true;
        if(i === q.answer){
          b.classList.add('correct');
          b.insertAdjacentHTML('beforeend','<span class="tagres o">✓ 정답</span>');
        } else if(i === pick){
          b.classList.add('wrong');
          b.insertAdjacentHTML('beforeend','<span class="tagres x">✗ 오답</span>');
        }
      });
      grade(q, isCorrect);
    });
  });

  document.querySelectorAll('.sa-btn').forEach(function(btn){
    var qid = parseInt(btn.getAttribute('data-q'),10);
    var q = QUIZ_DATA.filter(function(x){ return x.id === qid; })[0];
    var input = document.getElementById('in'+qid);
    var res = document.getElementById('res'+qid);
    function submit(){
      if(btn.disabled){ return; }
      var val = input.value;
      if(!val || !val.trim()){
        res.className = 'sa-res show x';
        res.textContent = '답을 입력한 뒤 제출해 주세요.';
        return;
      }
      var n = normalize(val);
      var isCorrect = q.answer.some(function(a){ return normalize(a) === n; });
      input.disabled = true; btn.disabled = true;
      res.className = 'sa-res show ' + (isCorrect ? 'o' : 'x');
      res.textContent = isCorrect ? '✓ 정답! (' + q.display + ')' : '✗ 오답 — 정답은 ' + q.display + '입니다.';
      grade(q, isCorrect);
    }
    btn.addEventListener('click', submit);
    input.addEventListener('keydown', function(e){ if(e.key === 'Enter'){ submit(); } });
  });
}

function updateBoard(){
  var acc = state.solved ? Math.round(state.correct / state.solved * 100) : 0;
  document.getElementById('bSolved').textContent = state.solved;
  document.getElementById('bCorrect').textContent = state.correct;
  document.getElementById('bAcc').textContent = acc;
  var bar = document.getElementById('bBar');
  bar.style.width = acc + '%';
  if(acc < 40){ bar.style.background = '#dc2626'; }
  else if(acc < 70){ bar.style.background = '#f59e0b'; }
  else { bar.style.background = '#16a34a'; }
}

function showResult(){
  var n = state.correct;
  var g, msg;
  if(n >= 9){ g='A'; msg='방송 내용을 거의 완벽하게 파악하셨습니다. 유가·금리·종목별 코멘트까지 놓친 게 거의 없네요.'; }
  else if(n >= 7){ g='B'; msg='핵심은 잘 잡으셨습니다. 틀린 문항의 해설과 원본 근거를 한 번 더 확인해 보세요.'; }
  else if(n >= 5){ g='C'; msg='절반은 맞히셨습니다. 유가·국채 수치와 실적 캘린더 부분을 다시 보시면 좋겠습니다.'; }
  else { g='D'; msg='해설의 원본 근거를 따라 리포트를 한 번 더 읽어보세요. 방송의 말처럼 "공부를 안 하면 불안해서 투자하기 힘듭니다".'; }
  document.getElementById('mGrade').textContent = g;
  document.getElementById('mScore').textContent = n + ' / ' + TOTAL + ' 정답 (' + Math.round(n/TOTAL*100) + '%)';
  document.getElementById('mMsg').textContent = msg;
  document.getElementById('mEasy').textContent = state.byDiff.easy + '/' + DIFF_TOTAL.easy;
  document.getElementById('mMid').textContent = state.byDiff.mid + '/' + DIFF_TOTAL.mid;
  document.getElementById('mHard').textContent = state.byDiff.hard + '/' + DIFF_TOTAL.hard;
  document.getElementById('modal').classList.add('show');
}

document.getElementById('mClose').addEventListener('click', function(){
  document.getElementById('modal').classList.remove('show');
});
document.getElementById('mRetry').addEventListener('click', function(){
  state = { solved:0, correct:0, byDiff:{easy:0,mid:0,hard:0} };
  document.getElementById('modal').classList.remove('show');
  render();
  updateBoard();
  window.scrollTo({top:0, behavior:'smooth'});
});

render();
updateBoard();

})();
</script>
</body>
</html>
