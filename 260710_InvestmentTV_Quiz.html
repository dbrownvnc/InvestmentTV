<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>투자는인생TV 7/9 멤버온리 — 복습 시험 (10문제)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Noto Sans KR', sans-serif; background:#fafafa; color:#1a1a1a;
    font-size:16px; line-height:1.7; -webkit-font-smoothing:antialiased;
  }
  .wrap { max-width:680px; margin:0 auto; padding:0 16px 90px; }

  /* ── 스티키 채점판 ── */
  #scoreboard {
    position:sticky; top:0; z-index:100; background:#ffffff;
    border-bottom:2px solid #1a1a1a; padding:12px 16px 10px;
    margin:0 -16px 0;
  }
  .sb-inner { max-width:648px; margin:0 auto; }
  .sb-row { display:flex; justify-content:space-between; align-items:baseline; gap:8px; flex-wrap:wrap; }
  .sb-title { font-family:'Playfair Display',serif; font-weight:900; font-size:15px; letter-spacing:0.02em; }
  .sb-stats { display:flex; gap:14px; font-size:13px; font-weight:700; }
  .sb-stats b { color:#e11d48; font-size:15px; }
  .sb-bar-track {
    margin-top:8px; height:8px; background:#e5e5e5; border-radius:99px; overflow:hidden;
  }
  #sbBar {
    height:100%; width:0%; border-radius:99px;
    background:#ef4444; transition:width .4s ease, background-color .4s ease;
  }

  /* ── 헤더 ── */
  header { padding:34px 4px 6px; }
  .kicker { font-size:12px; letter-spacing:0.22em; font-weight:700; color:#e11d48; text-transform:uppercase; }
  h1 {
    font-family:'Playfair Display','Noto Sans KR',serif;
    font-size:clamp(24px,5.5vw,32px); font-weight:900; line-height:1.3; margin-top:10px;
  }
  .deck { color:#777777; font-size:14px; margin-top:10px; }

  /* ── 문제 카드 ── */
  .q-card {
    background:#ffffff; border:1px solid #e5e5e5; border-radius:16px;
    padding:24px 20px; margin-top:22px;
  }
  .q-meta { display:flex; align-items:center; gap:8px; margin-bottom:12px; flex-wrap:wrap; }
  .q-num {
    font-family:'Playfair Display',serif; font-weight:900; font-size:22px; color:#e11d48;
  }
  .badge {
    font-size:11px; font-weight:700; padding:3px 10px; border-radius:999px; letter-spacing:0.04em;
  }
  .badge.type { background:#1a1a1a; color:#fff; }
  .badge.d1 { background:#f0fdf4; color:#16a34a; border:1px solid #bbf7d0; }
  .badge.d2 { background:#fffbeb; color:#d97706; border:1px solid #fde68a; }
  .badge.d3 { background:#fff1f2; color:#e11d48; border:1px solid #fecdd3; }
  .q-text { font-size:16.5px; font-weight:700; line-height:1.65; margin-bottom:16px; }

  .opts { display:flex; flex-direction:column; gap:9px; }
  .opt {
    display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    padding:13px 15px; font-size:15px; font-family:inherit; line-height:1.5;
    background:#fafafa; border:1.5px solid #e5e5e5; border-radius:11px;
    cursor:pointer; transition:all .18s; color:#1a1a1a;
  }
  .opt:hover:not(:disabled) { border-color:#e11d48; background:#fff; }
  .opt:disabled { cursor:default; opacity:.92; }
  .opt .letter {
    flex-shrink:0; width:26px; height:26px; border-radius:50%; background:#fff;
    border:1.5px solid #d4d4d4; display:flex; align-items:center; justify-content:center;
    font-size:12.5px; font-weight:900;
  }
  .opt.correct {
    background:#f0fdf4; border-color:#16a34a; font-weight:700;
  }
  .opt.correct .letter { background:#16a34a; border-color:#16a34a; color:#fff; }
  .opt.wrong {
    background:#fef2f2; border-color:#ef4444;
  }
  .opt.wrong .letter { background:#ef4444; border-color:#ef4444; color:#fff; }
  .flag-badge {
    margin-left:auto; font-size:12px; font-weight:900; white-space:nowrap;
  }
  .flag-badge.ok { color:#16a34a; }
  .flag-badge.no { color:#ef4444; }

  /* OX */
  .ox-row { display:flex; gap:10px; }
  .ox-row .opt { flex:1; justify-content:center; font-size:22px; font-weight:900; padding:16px; }

  /* 단답형 */
  .short-row { display:flex; gap:8px; }
  .short-row input {
    flex:1; min-width:0; padding:12px 14px; font-size:15px; font-family:inherit;
    border:1.5px solid #e5e5e5; border-radius:11px; background:#fafafa;
  }
  .short-row input:focus { outline:none; border-color:#e11d48; background:#fff; }
  .short-row input:disabled { opacity:.85; }
  .short-row input.correct { border-color:#16a34a; background:#f0fdf4; font-weight:700; }
  .short-row input.wrong { border-color:#ef4444; background:#fef2f2; }
  .submit-btn {
    flex-shrink:0; padding:12px 20px; font-size:14px; font-weight:700; font-family:inherit;
    background:#1a1a1a; color:#fff; border:none; border-radius:11px; cursor:pointer;
    transition:background .2s;
  }
  .submit-btn:hover:not(:disabled) { background:#e11d48; }
  .submit-btn:disabled { opacity:.4; cursor:default; }
  .short-answer-reveal {
    margin-top:10px; font-size:13.5px; font-weight:700; color:#16a34a; display:none;
  }
  .short-answer-reveal.show { display:block; }

  /* 해설 */
  .explain {
    max-height:0; overflow:hidden; transition:max-height .45s ease, margin .45s ease;
    margin-top:0;
  }
  .explain.show { max-height:520px; margin-top:16px; }
  .explain-inner {
    background:#fafafa; border-left:4px solid #e11d48; border-radius:0 10px 10px 0;
    padding:15px 16px; font-size:14px; line-height:1.75;
  }
  .explain-inner .ex-label {
    font-size:11.5px; font-weight:900; letter-spacing:0.14em; color:#e11d48; margin-bottom:6px;
  }
  .explain-inner .quote {
    display:block; margin-top:8px; padding-top:8px; border-top:1px dashed #d4d4d4;
    color:#777777; font-size:13px;
  }

  /* ── 결과 모달 ── */
  #modalOverlay {
    position:fixed; inset:0; background:rgba(26,26,26,.55); z-index:200;
    display:none; align-items:center; justify-content:center; padding:20px;
    backdrop-filter:blur(3px);
  }
  #modalOverlay.show { display:flex; animation:fadeIn .3s ease; }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  .modal {
    background:#fff; border-radius:20px; max-width:420px; width:100%;
    padding:36px 28px; text-align:center; animation:rise .4s ease;
  }
  @keyframes rise { from{transform:translateY(24px); opacity:0;} to{transform:none; opacity:1;} }
  .modal .m-kicker { font-size:11px; letter-spacing:0.22em; font-weight:700; color:#e11d48; text-transform:uppercase; }
  .grade {
    font-family:'Playfair Display',serif; font-size:84px; font-weight:900; line-height:1;
    margin:14px 0 4px; color:#e11d48;
  }
  .m-score { font-size:17px; font-weight:900; }
  .m-sub { font-size:13.5px; color:#777777; margin-top:12px; line-height:1.8; }
  .retry-btn {
    margin-top:24px; padding:13px 34px; font-size:15px; font-weight:700; font-family:inherit;
    background:#e11d48; color:#fff; border:none; border-radius:999px; cursor:pointer;
    transition:transform .15s, background .2s;
  }
  .retry-btn:hover { background:#1a1a1a; transform:translateY(-2px); }

  footer { margin-top:56px; font-size:12px; color:#777777; text-align:center; line-height:1.8; }
  @media (max-width:400px) {
    .q-card { padding:20px 15px; }
    .sb-stats { gap:10px; font-size:12px; }
  }
</style>
</head>

<div class="wrap">

  {
    id: 10, type: 'short', difficulty: 2,
    question: 'SKHY 상장으로 단기적으로는 부정적 영향을 받겠지만, 2028년 이후에는 오히려 하이닉스의 시장점유율을 역전할 것으로 전망된 미국 기업은? (한글 또는 영문)',
    answer: ['마이크론', 'micron', 'MU', 'mu', '마이크론테크놀로지'],
    display: '마이크론 (Micron, MU)',
    explanation: '하이닉스의 미국 상장이 단기적으로 마이크론 주가에 부정적일 수 있지만, 2028년 이후에는 마이크론이 시장점유율에서 하이닉스를 역전할 것으로 전망했습니다. 그래서 "마이크론은 롱텀(장기)으로 가져가야 한다"고 강조했습니다.',
    quote: '원문 근거: "마이크론이 2027~2028년부터 하이닉스를 앞지를 것으로 판단하고 있어요... 마이크론은 롱텀으로 가져가야 되는 거예요." / 슬라이드: "2028년 이후 시장점유율 마이크론이 하이닉스를 역전할 것으로 전망"'
  }
];

const TYPE_LABEL = { mc: '객관식', short: '단답형', ox: 'OX' };
const DIFF = { 1: ['쉬움', 'd1'], 2: ['보통', 'd2'], 3: ['어려움', 'd3'] };
const LETTERS = ['A', 'B', 'C', 'D'];

let state = { solved: 0, correct: 0 };

/* ── 렌더링 ── */
function render() {
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  QUIZ_DATA.forEach(q => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'q' + q.id;

    let bodyHtml = '';
    if (q.type === 'mc') {
      bodyHtml = '<div class="opts">' + q.options.map((opt, i) =>
        `<button class="opt" data-q="${q.id}" data-i="${i}"><span class="letter">${LETTERS[i]}</span><span>${opt}</span></button>`
      ).join('') + '</div>';
    } else if (q.type === 'ox') {
      bodyHtml = `<div class="ox-row">
        <button class="opt" data-q="${q.id}" data-i="0">O</button>
        <button class="opt" data-q="${q.id}" data-i="1">X</button>
      </div>`;
    } else {
      bodyHtml = `<div class="short-row">
        <input type="text" id="input-${q.id}" placeholder="정답 입력" autocomplete="off">
        <button class="submit-btn" data-q="${q.id}">제출</button>
      </div>
      <div class="short-answer-reveal" id="reveal-${q.id}"></div>`;
    }

    card.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Q${q.id}</span>
        <span class="badge type">${TYPE_LABEL[q.type]}</span>
        <span class="badge ${DIFF[q.difficulty][1]}">${DIFF[q.difficulty][0]}</span>
      </div>
      <div class="q-text">${q.question}</div>
      ${bodyHtml}
      <div class="explain" id="explain-${q.id}">
        <div class="explain-inner">
          <div class="ex-label">해설</div>
          ${q.explanation}
          <span class="quote">${q.quote}</span>
        </div>
      </div>`;
    area.appendChild(card);
  });

  // 이벤트 바인딩
  document.querySelectorAll('.opt').forEach(btn => {
    btn.addEventListener('click', () => {
      const q = QUIZ_DATA.find(x => x.id === +btn.dataset.q);
      gradeChoice(q, +btn.dataset.i);
    });
  });
  document.querySelectorAll('.submit-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const q = QUIZ_DATA.find(x => x.id === +btn.dataset.q);
      gradeShort(q);
    });
  });
  document.querySelectorAll('.short-row input').forEach(inp => {
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const qid = +inp.id.split('-')[1];
        gradeShort(QUIZ_DATA.find(x => x.id === qid));
      }
    });
  });
}

/* ── 채점: 객관식/OX ── */
function gradeChoice(q, picked) {
  const card = document.getElementById('q' + q.id);
  if (card.dataset.done) return;
  card.dataset.done = '1';

  const isCorrect = picked === q.answer;
  card.querySelectorAll('.opt').forEach(btn => {
    const i = +btn.dataset.i;
    btn.disabled = true;
    if (i === q.answer) {
      btn.classList.add('correct');
      btn.insertAdjacentHTML('beforeend', `<span class="flag-badge ok">${isCorrect ? '✓ 정답!' : '✓ 정답'}</span>`);
    } else if (i === picked) {
      btn.classList.add('wrong');
      btn.insertAdjacentHTML('beforeend', '<span class="flag-badge no">✗ 오답</span>');
    }
  });
  finishQuestion(q, isCorrect);
}

/* ── 채점: 단답형 ── */
function gradeShort(q) {
  const card = document.getElementById('q' + q.id);
  if (card.dataset.done) return;
  const input = document.getElementById('input-' + q.id);
  const val = input.value.trim();
  if (!val) { input.focus(); return; }
  card.dataset.done = '1';

  const norm = s => s.replace(/[\s\.\,\$]/g, '').toLowerCase();
  const isCorrect = q.answer.some(a => norm(a) === norm(val));

  input.disabled = true;
  card.querySelector('.submit-btn').disabled = true;
  input.classList.add(isCorrect ? 'correct' : 'wrong');

  const reveal = document.getElementById('reveal-' + q.id);
  reveal.textContent = (isCorrect ? '✓ 정답! ' : '✗ 오답 — ') + '정답: ' + q.display;
  reveal.classList.add('show');
  if (!isCorrect) reveal.style.color = '#ef4444';

  finishQuestion(q, isCorrect);
}

/* ── 공통 마무리 ── */
function finishQuestion(q, isCorrect) {
  state.solved++;
  if (isCorrect) state.correct++;
  document.getElementById('explain-' + q.id).classList.add('show');
  updateScoreboard();
  if (state.solved === QUIZ_DATA.length) {
    setTimeout(showModal, 700);
  }
}

/* ── 채점판 갱신 ── */
function updateScoreboard() {
  const rate = state.solved === 0 ? 0 : Math.round((state.correct / state.solved) * 100);
  document.getElementById('sbSolved').textContent = state.solved;
  document.getElementById('sbCorrect').textContent = state.correct;
  document.getElementById('sbRate').textContent = rate + '%';
  const bar = document.getElementById('sbBar');
  bar.style.width = (state.solved / QUIZ_DATA.length * 100) + '%';
  bar.style.backgroundColor = rate < 40 ? '#ef4444' : rate < 70 ? '#f59e0b' : '#16a34a';
}

/* ── 결과 모달 ── */
function showModal() {
  const score = state.correct;
  const pct = Math.round(score / QUIZ_DATA.length * 100);
  let grade, msg;
  if (pct >= 90) { grade = 'A'; msg = '완벽합니다! 리밸런싱부터 CAPEX 리스크까지 완전히 이해하셨네요. "공부한 멤버와 안 한 멤버는 2~3억씩 차이 난다" — 당신은 전자입니다. 🏆'; }
  else if (pct >= 70) { grade = 'B'; msg = '훌륭해요! 핵심 흐름은 확실히 잡으셨습니다. 틀린 문제의 해설만 다시 읽으면 A는 금방입니다. 💪'; }
  else if (pct >= 50) { grade = 'C'; msg = '절반은 넘겼습니다. 섹터 로테이션과 7월 말 CAPEX 일정을 중심으로 리포트를 한 번 더 복습해 보세요. 📖'; }
  else { grade = 'D'; msg = '"낚시하러 가는데 낚싯대는 준비해 오셔야죠." 분석 리포트를 정독한 뒤 다시 풀기에 도전해 보세요 — 공부가 곧 수익입니다. 🎣'; }
  document.getElementById('mGrade').textContent = grade;
  document.getElementById('mScore').textContent = `10문제 중 ${score}문제 정답 (${pct}%)`;
  document.getElementById('mMsg').textContent = msg;
  document.getElementById('modalOverlay').classList.add('show');
}

/* ── 다시 풀기 ── */
document.getElementById('retryBtn').addEventListener('click', () => {
  state = { solved: 0, correct: 0 };
  document.getElementById('modalOverlay').classList.remove('show');
  updateScoreboard();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

/* ── 시작 ── */
render();
updateScoreboard();
</script>
</body>
</html>
