<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시험문제 | 투자는인생TV 시장 포커스</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #fafafa;
    --text: #1a1a1a;
    --text2: #777777;
    --accent: #e11d48;
    --accent2: #f43f5e;
    --border: #e5e5e5;
    --correct: #16a34a;
    --wrong: #dc2626;
    --correct-bg: #dcfce7;
    --wrong-bg: #fee2e2;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg2);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Sticky score bar ── */
  .score-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--text);
    color: #fff;
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .score-bar .sb-label {
    font-size: 12px;
    color: #aaa;
    flex-shrink: 0;
  }
  .score-bar .sb-nums {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
  }
  .score-bar .sb-rate {
    font-size: 13px;
    font-weight: 700;
    margin-left: auto;
    flex-shrink: 0;
  }
  .progress-outer {
    width: 100%;
    height: 4px;
    background: #333;
    border-radius: 4px;
    margin-top: 4px;
    overflow: hidden;
  }
  .progress-inner {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease, background 0.4s;
    width: 0%;
    background: var(--accent);
  }

  /* ── Header ── */
  .header {
    background: var(--text);
    padding: 32px 20px 24px;
    text-align: center;
  }
  .header-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.25em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(20px, 5vw, 28px);
    color: #fff;
    font-weight: 900;
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .header-desc {
    font-size: 12px;
    color: #888;
  }

  /* ── Container ── */
  .container {
    max-width: 640px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* ── Quiz card ── */
  .quiz-card {
    background: var(--bg);
    border-radius: 12px;
    box-shadow: var(--shadow);
    margin-bottom: 22px;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .card-header {
    padding: 16px 18px 12px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .q-num {
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    border-radius: 6px;
    padding: 2px 10px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .q-meta { display: flex; gap: 6px; flex-shrink: 0; margin-top: 2px; flex-wrap: wrap; }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.04em;
  }
  .badge-easy { background: #dcfce7; color: #16a34a; }
  .badge-medium { background: #fef9c3; color: #ca8a04; }
  .badge-hard { background: #fee2e2; color: #dc2626; }
  .badge-mc { background: #eff6ff; color: #2563eb; }
  .badge-sa { background: #f5f3ff; color: #7c3aed; }
  .badge-ox { background: #fff7ed; color: #ea580c; }

  .q-text {
    padding: 16px 18px 12px;
    font-size: 15px;
    font-weight: 500;
    line-height: 1.65;
    color: var(--text);
  }

  /* ── Options ── */
  .options { padding: 0 18px 14px; display: flex; flex-direction: column; gap: 8px; }
  .option-btn {
    width: 100%;
    text-align: left;
    padding: 11px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    background: var(--bg2);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    line-height: 1.5;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--accent);
    background: #fff5f7;
    transform: translateX(2px);
  }
  .option-btn:disabled { cursor: not-allowed; }
  .opt-label {
    background: var(--border);
    color: var(--text2);
    font-size: 11px;
    font-weight: 700;
    border-radius: 4px;
    padding: 1px 7px;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .option-btn.correct { border-color: var(--correct); background: var(--correct-bg); }
  .option-btn.correct .opt-label { background: var(--correct); color: #fff; }
  .option-btn.wrong { border-color: var(--wrong); background: var(--wrong-bg); }
  .option-btn.wrong .opt-label { background: var(--wrong); color: #fff; }

  /* ── OX buttons ── */
  .ox-group { padding: 0 18px 14px; display: flex; gap: 12px; }
  .ox-btn {
    flex: 1;
    padding: 14px;
    font-size: 26px;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--bg2);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .ox-btn span.ox-word { font-size: 12px; color: var(--text2); }
  .ox-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff5f7; transform: scale(1.03); }
  .ox-btn:disabled { cursor: not-allowed; }
  .ox-btn.correct { border-color: var(--correct); background: var(--correct-bg); }
  .ox-btn.wrong { border-color: var(--wrong); background: var(--wrong-bg); }

  /* ── Short answer ── */
  .sa-group {
    padding: 0 18px 14px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .sa-input {
    flex: 1;
    min-width: 140px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: var(--bg2);
    outline: none;
    transition: border-color 0.2s;
  }
  .sa-input:focus { border-color: var(--accent); }
  .sa-input:disabled { background: #f5f5f5; }
  .sa-submit {
    padding: 10px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .sa-submit:hover { opacity: 0.85; }
  .sa-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Feedback badge ── */
  .feedback-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
    margin-left: 8px;
  }
  .feedback-badge.correct { background: var(--correct-bg); color: var(--correct); }
  .feedback-badge.wrong { background: var(--wrong-bg); color: var(--wrong); }

  /* ── Explanation ── */
  .explanation {
    display: none;
    padding: 14px 18px;
    background: #f8fafc;
    border-top: 1px solid var(--border);
    font-size: 13px;
    color: #374151;
    line-height: 1.65;
  }
  .explanation.show { display: block; }
  .exp-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .exp-answer {
    font-size: 12px;
    font-weight: 700;
    background: var(--correct-bg);
    color: var(--correct);
    display: inline-block;
    padding: 2px 10px;
    border-radius: 8px;
    margin-bottom: 8px;
  }

  /* ── Final modal ── */
  .final-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .final-overlay.show { display: flex; }
  .final-card {
    background: #fff;
    border-radius: 16px;
    padding: 36px 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .final-emoji { font-size: 52px; margin-bottom: 12px; }
  .final-title {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 900;
    color: var(--text);
    margin-bottom: 6px;
  }
  .final-grade {
    font-size: 42px;
    font-weight: 900;
    color: var(--accent);
    font-family: 'Playfair Display', serif;
    margin: 8px 0;
  }
  .final-score { font-size: 15px; color: var(--text2); margin-bottom: 10px; }
  .final-msg { font-size: 14px; color: var(--text); margin-bottom: 24px; line-height: 1.6; }
  .final-reset {
    width: 100%;
    padding: 13px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s;
  }
  .final-reset:hover { opacity: 0.85; }

  @media (max-width: 380px) {
    .card-header { flex-wrap: wrap; }
    .sa-group { flex-direction: column; align-items: stretch; }
    .sa-submit { width: 100%; }
  }
</style>
</head>

    ],
    answer: 1,
    explanation: '"내가 가지고 있는 1억을 똑같은 투자 리스크에서 A라는 사람은 1억 2천밖에 안 되는데 왜 다른 사람은 1억 5천, 6천, 2억 3억 10억이 되냐. 섹터 로테이션과 리밸런싱 전략이 있고 없고의 차이입니다"라고 명시했습니다.'
  }
];

let state = { solved: 0, correct: 0, answered: {} };

function renderQuiz() {
  const container = document.getElementById('quizContainer');
  container.innerHTML = '';
  QUIZ_DATA.forEach(q => {
    const card = document.createElement('div');
    card.className = 'quiz-card';
    card.id = `card-${q.id}`;

    const diffMap = { easy: ['쉬움', 'badge-easy'], medium: ['보통', 'badge-medium'], hard: ['어려움', 'badge-hard'] };
    const typeMap = { mc: ['객관식', 'badge-mc'], ox: ['O/X', 'badge-ox'], sa: ['단답형', 'badge-sa'] };

    card.innerHTML = `
      <div class="card-header">
        <div class="q-num">Q${q.id}</div>
        <div class="q-meta">
          <span class="badge ${typeMap[q.type][1]}">${typeMap[q.type][0]}</span>
          <span class="badge ${diffMap[q.difficulty][1]}">${diffMap[q.difficulty][0]}</span>
        </div>
      </div>
      <div class="q-text">${q.question}</div>
      ${buildInput(q)}
      <div class="explanation" id="exp-${q.id}">
        <div class="exp-title">📖 해설</div>
        <div class="exp-answer" id="ans-label-${q.id}"></div>
        <div>${q.explanation}</div>
      </div>
    `;
    container.appendChild(card);
    bindEvents(q);
  });
}

function buildInput(q) {
  if (q.type === 'mc') {
    const opts = q.options.map((opt, i) => `
      <button class="option-btn" id="opt-${q.id}-${i}" onclick="handleMC(${q.id}, ${i})">
        <span class="opt-label">${String.fromCharCode(65+i)}</span>
        <span>${opt}</span>
      </button>
    `).join('');
    return `<div class="options">${opts}</div>`;
  }
  if (q.type === 'ox') {
    return `
      <div class="ox-group">
        <button class="ox-btn" id="ox-${q.id}-O" onclick="handleOX(${q.id}, 'O')">
          <span>⭕</span><span class="ox-word">맞다 (O)</span>
        </button>
        <button class="ox-btn" id="ox-${q.id}-X" onclick="handleOX(${q.id}, 'X')">
          <span>❌</span><span class="ox-word">틀리다 (X)</span>
        </button>
      </div>
    `;
  }
  if (q.type === 'sa') {
    return `
      <div class="sa-group">
        <input class="sa-input" id="sa-input-${q.id}" type="text" placeholder="정답을 입력하세요" onkeydown="if(event.key==='Enter') handleSA(${q.id})">
        <button class="sa-submit" id="sa-btn-${q.id}" onclick="handleSA(${q.id})">제출</button>
      </div>
    `;
  }
}

function bindEvents(q) { /* events bound inline */ }

function handleMC(qid, chosen) {
  if (state.answered[qid] !== undefined) return;
  const q = QUIZ_DATA.find(x => x.id === qid);
  const isCorrect = chosen === q.answer;
  markAnswered(qid, isCorrect);

  for (let i = 0; i < q.options.length; i++) {
    const btn = document.getElementById(`opt-${qid}-${i}`);
    btn.disabled = true;
    if (i === q.answer) btn.classList.add('correct');
    else if (i === chosen && !isCorrect) btn.classList.add('wrong');
  }

  showExplanation(qid, isCorrect, String.fromCharCode(65 + q.answer) + '. ' + q.options[q.answer]);
}

function handleOX(qid, chosen) {
  if (state.answered[qid] !== undefined) return;
  const q = QUIZ_DATA.find(x => x.id === qid);
  const isCorrect = chosen === q.answer;
  markAnswered(qid, isCorrect);

  ['O','X'].forEach(v => {
    const btn = document.getElementById(`ox-${qid}-${v}`);
    btn.disabled = true;
    if (v === q.answer) btn.classList.add('correct');
    else if (v === chosen && !isCorrect) btn.classList.add('wrong');
  });

  showExplanation(qid, isCorrect, '정답: ' + q.answer);
}

function handleSA(qid) {
  if (state.answered[qid] !== undefined) return;
  const q = QUIZ_DATA.find(x => x.id === qid);
  const input = document.getElementById(`sa-input-${qid}`);
  const userVal = input.value.trim();
  if (!userVal) { input.style.borderColor = '#f87171'; setTimeout(() => input.style.borderColor = '', 1000); return; }

  const allAnswers = [q.answer, ...(q.alt_answers || [])].map(a => a.toString().toLowerCase().replace(/\s/g,'').replace(/,/g,''));
  const normalUser = userVal.toLowerCase().replace(/\s/g,'').replace(/,/g,'').replace(/%/g,'');
  const isCorrect = allAnswers.some(a => a.replace(/%/g,'') === normalUser);

  markAnswered(qid, isCorrect);
  input.disabled = true;
  document.getElementById(`sa-btn-${qid}`).disabled = true;
  input.style.borderColor = isCorrect ? 'var(--correct)' : 'var(--wrong)';
  input.style.background = isCorrect ? 'var(--correct-bg)' : 'var(--wrong-bg)';

  showExplanation(qid, isCorrect, '정답: ' + q.answer);
}

function markAnswered(qid, isCorrect) {
  state.answered[qid] = isCorrect;
  state.solved++;
  if (isCorrect) state.correct++;
  updateScoreBar();
  if (state.solved === QUIZ_DATA.length) {
    setTimeout(showFinal, 900);
  }
}

function showExplanation(qid, isCorrect, answerLabel) {
  const expEl = document.getElementById(`exp-${qid}`);
  const ansLabel = document.getElementById(`ans-label-${qid}`);
  ansLabel.textContent = (isCorrect ? '✓ 정답! ' : '✗ 오답 · ') + answerLabel;
  ansLabel.style.background = isCorrect ? '#dcfce7' : '#fee2e2';
  ansLabel.style.color = isCorrect ? '#16a34a' : '#dc2626';
  expEl.classList.add('show');
}

function updateScoreBar() {
  const rate = state.solved > 0 ? Math.round((state.correct / state.solved) * 100) : 0;
  document.getElementById('sbSolved').textContent = `${state.solved} / ${QUIZ_DATA.length} 문제 풀음`;
  document.getElementById('sbCorrect').textContent = `${state.correct} 문제`;
  document.getElementById('sbRate').textContent = `정답률 ${rate}%`;
  const bar = document.getElementById('progressInner');
  bar.style.width = (state.solved / QUIZ_DATA.length * 100) + '%';
  bar.style.background = rate < 40 ? '#dc2626' : rate < 70 ? '#f59e0b' : '#16a34a';
}

function showFinal() {
  const pct = state.solved > 0 ? Math.round((state.correct / state.solved) * 100) : 0;
  let grade, emoji, msg;
  if (pct >= 90) { grade = 'A'; emoji = '🏆'; msg = '완벽합니다! 시장 분석가 수준의 이해력을 갖추셨습니다.'; }
  else if (pct >= 80) { grade = 'B'; emoji = '🎯'; msg = '훌륭합니다! 핵심 개념을 잘 파악하고 계십니다.'; }
  else if (pct >= 60) { grade = 'C'; emoji = '📈'; msg = '좋습니다! 방송 내용을 다시 한번 복습해 보세요.'; }
  else { grade = 'D'; emoji = '📚'; msg = '처음부터 방송을 꼼꼼히 다시 보시길 권장합니다.'; }

  document.getElementById('finalEmoji').textContent = emoji;
  document.getElementById('finalGrade').textContent = grade;
  document.getElementById('finalScore').textContent = `10문제 중 ${state.correct}문제 정답 (${pct}%)`;
  document.getElementById('finalMsg').textContent = msg;
  document.getElementById('finalOverlay').classList.add('show');
}

function resetQuiz() {
  state = { solved: 0, correct: 0, answered: {} };
  document.getElementById('finalOverlay').classList.remove('show');
  updateScoreBar();
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderQuiz();
</script>
</body>
</html>
