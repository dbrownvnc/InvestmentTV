<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>6월11일 멤버온리 라이브 — 이해도 점검 시험 (10문제)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#ffffff; --bg2:#fafafa;
    --ink:#1a1a1a; --ink2:#777777;
    --accent:#e11d48; --accent2:#f43f5e;
    --line:#e5e5e5;
    --ok:#16a34a; --ok-bg:#f0fdf4;
    --no:#dc2626; --no-bg:#fef2f2;
    --warn:#f59e0b;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{
    background:var(--bg); color:var(--ink);
    font-family:'Noto Sans KR',sans-serif; line-height:1.7; font-size:16px;
    word-break:keep-all;
  }
  .wrap{max-width:680px;margin:0 auto;padding:0 18px 90px}

  /* ── sticky scoreboard ── */
  #board{
    position:sticky;top:0;z-index:50;
    background:rgba(255,255,255,.96);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
    padding:12px 18px 10px;margin:0 -18px 28px;
  }
  .board-row{display:flex;justify-content:space-between;align-items:baseline;max-width:644px;margin:0 auto}
  .board-row .item{font-size:12.5px;color:var(--ink2);font-weight:500}
  .board-row .item b{font-family:'Playfair Display','Noto Sans KR',serif;font-size:19px;color:var(--ink);font-weight:900;margin-right:2px}
  .board-row .item b.rate{color:var(--accent)}
  #pbar-track{max-width:644px;margin:8px auto 0;height:6px;border-radius:99px;background:var(--line);overflow:hidden}
  #pbar{height:100%;width:0%;border-radius:99px;background:var(--no);transition:width .45s ease, background-color .45s ease}

  /* ── header ── */
  header{padding:42px 0 30px;border-bottom:3px solid var(--ink);margin-bottom:34px}
  .eyebrow{display:flex;align-items:center;gap:10px;font-size:11.5px;letter-spacing:.18em;font-weight:700;color:var(--accent);text-transform:uppercase;margin-bottom:14px}
  .eyebrow::before{content:'';width:30px;height:2px;background:var(--accent)}
  h1{font-family:'Playfair Display','Noto Sans KR',serif;font-size:clamp(26px,6.4vw,36px);font-weight:900;line-height:1.28}
  .sub{margin-top:12px;font-size:13.5px;color:var(--ink2)}
  .sub b{color:var(--ink)}

  /* ── question card ── */
  .q-card{
    border:1px solid var(--line);border-radius:16px;background:#fff;
    padding:24px 20px;margin-bottom:22px;
    box-shadow:0 1px 3px rgba(0,0,0,.03);
  }
  .q-top{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .q-num{
    font-family:'Playfair Display',serif;font-weight:900;font-size:15px;
    background:var(--ink);color:#fff;border-radius:8px;padding:3px 11px;
  }
  .badge{font-size:11px;font-weight:700;border-radius:999px;padding:3px 11px;letter-spacing:.04em}
  .badge.type{background:var(--bg2);border:1px solid var(--line);color:var(--ink2)}
  .badge.d1{background:#f0fdf4;color:var(--ok)}
  .badge.d2{background:#fffbeb;color:var(--warn)}
  .badge.d3{background:var(--no-bg);color:var(--no)}
  .q-text{font-size:16.5px;font-weight:700;line-height:1.6;margin-bottom:16px}

  .opts{display:flex;flex-direction:column;gap:9px}
  .opt{
    display:flex;align-items:center;gap:11px;width:100%;text-align:left;
    border:1.5px solid var(--line);border-radius:12px;background:#fff;
    padding:13px 15px;font-family:inherit;font-size:14.5px;line-height:1.5;
    cursor:pointer;transition:border-color .18s, background .18s, transform .12s;
    color:var(--ink);
  }
  .opt:not(:disabled):hover{border-color:var(--accent2);background:#fff7f8}
  .opt:not(:disabled):active{transform:scale(.985)}
  .opt .key{
    flex:0 0 26px;height:26px;border-radius:8px;border:1.5px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    font-size:12.5px;font-weight:900;color:var(--ink2);background:var(--bg2);
  }
  .opt:disabled{cursor:default;opacity:.92}
  .opt.correct{border-color:var(--ok);background:var(--ok-bg)}
  .opt.correct .key{background:var(--ok);border-color:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--no);background:var(--no-bg)}
  .opt.wrong .key{background:var(--no);border-color:var(--no);color:#fff}
  .opt .mark-badge{margin-left:auto;font-size:12px;font-weight:900;white-space:nowrap}
  .opt.correct .mark-badge{color:var(--ok)}
  .opt.wrong .mark-badge{color:var(--no)}

  .ox-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .ox-row .opt{justify-content:center;font-size:24px;font-weight:900;padding:16px}

  .short-row{display:flex;gap:9px}
  .short-row input{
    flex:1;border:1.5px solid var(--line);border-radius:12px;padding:12px 15px;
    font-family:inherit;font-size:15px;outline:none;min-width:0;
  }
  .short-row input:focus{border-color:var(--accent)}
  .short-row input:disabled{background:var(--bg2);color:var(--ink2)}
  .short-row button{
    border:none;border-radius:12px;background:var(--accent);color:#fff;
    font-family:inherit;font-size:14px;font-weight:700;padding:0 22px;cursor:pointer;
    transition:background .18s;white-space:nowrap;
  }
  .short-row button:not(:disabled):hover{background:#be123c}
  .short-row button:disabled{background:var(--line);color:var(--ink2);cursor:default}
  .short-result{display:none;margin-top:11px;font-size:14px;font-weight:700;border-radius:10px;padding:11px 14px}
  .short-result.ok{display:block;background:var(--ok-bg);color:var(--ok)}
  .short-result.no{display:block;background:var(--no-bg);color:var(--no)}

  .expl{
    display:none;margin-top:16px;border-left:4px solid var(--accent);
    background:var(--bg2);border-radius:0 12px 12px 0;padding:15px 16px;
    font-size:13.8px;color:#333;animation:slide .4s ease;
  }
  .expl.show{display:block}
  .expl .ex-t{font-weight:900;color:var(--accent);font-size:12px;letter-spacing:.12em;margin-bottom:6px}
  .expl .src{display:block;margin-top:9px;font-size:12.5px;color:var(--ink2);border-top:1px dashed var(--line);padding-top:9px}
  .expl .src b{color:var(--ink)}
  @keyframes slide{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:translateY(0)}}

  /* ── final modal ── */
  #overlay{
    display:none;position:fixed;inset:0;z-index:100;
    background:rgba(26,26,26,.55);backdrop-filter:blur(3px);
    align-items:center;justify-content:center;padding:22px;
  }
  #overlay.show{display:flex}
  .final{
    background:#fff;border-radius:22px;max-width:400px;width:100%;
    padding:36px 28px;text-align:center;animation:pop .45s cubic-bezier(.18,.9,.3,1.2);
  }
  @keyframes pop{from{opacity:0;transform:scale(.86)}to{opacity:1;transform:scale(1)}}
  .final .grade{
    font-family:'Playfair Display',serif;font-size:74px;font-weight:900;
    color:var(--accent);line-height:1;
  }
  .final h2{font-size:19px;font-weight:900;margin:12px 0 6px}
  .final .fs{font-size:14px;color:var(--ink2);margin-bottom:6px}
  .final .fs b{color:var(--ink);font-size:17px}
  .final .msg{font-size:13.5px;color:#444;background:var(--bg2);border-radius:12px;padding:13px 15px;margin:16px 0 20px;line-height:1.65}
  .final .btns{display:flex;gap:9px}
  .final button{
    flex:1;padding:13px;border-radius:12px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s;
  }
  #retryBtn{border:none;background:var(--accent);color:#fff}
  #retryBtn:hover{background:#be123c}
  #closeBtn{border:1.5px solid var(--line);background:#fff;color:var(--ink)}
  #closeBtn:hover{border-color:var(--ink)}

  footer{margin-top:46px;font-size:12px;color:var(--ink2);text-align:center;line-height:1.7}

  @media (max-width:380px){
    .wrap{padding:0 13px 70px}
    .q-card{padding:19px 15px}
    .board-row .item{font-size:11.5px}
    .board-row .item b{font-size:16px}
  }
</style>
</head>
<body>

<div id="board">
  <div class="board-row">
    <span class="item"><b id="bSolved">0</b>/ 10 푼 문제</span>
    <span class="item"><b id="bCorrect">0</b>맞힌 문제</span>
    <span class="item"><b id="bRate" class="rate">0%</b>정답률</span>
  </div>
  <div id="pbar-track"><div id="pbar"></div></div>
</div>

<div class="wrap">

<header>
  <div class="eyebrow">투자는인생TV · 멤버온리 라이브 · Quiz</div>
  <h1>6월 11일 방송<br>이해도 점검 시험</h1>
  <div class="sub">총 <b>10문제</b> · 객관식 6 / 단답형 2 / OX 2 — 보기를 선택하면 즉시 채점되고 해설이 펼쳐집니다.</div>
</header>

<div id="quiz"></div>

<footer>2026년 6월 11일 멤버온리 라이브 방송 내용 기반 · 학습용 자료</footer>
</div>

<div id="overlay">
  <div class="final">
    <div class="grade" id="fGrade">A</div>
    <h2 id="fTitle">시험 완료!</h2>
    <div class="fs">총점 <b id="fScore">100점</b> · <span id="fDetail">10문제 중 10개 정답</span></div>
    <div class="msg" id="fMsg"></div>
    <div class="btns">
      <button id="retryBtn">다시 풀기</button>
      <button id="closeBtn">결과 닫기</button>
    </div>
  </div>
</div>

<script>
const QUIZ_DATA = [
  {
    id: 1, type: 'mc', difficulty: '쉬움',
    question: '5월 헤드라인 PPI(생산자물가지수)는 어떻게 발표되었는가?',
    options: ['+0.4% (예상 부합)', '+0.7% (예상 1.1%)', '+1.1% (예상 0.7%)', '+6.5% (예상 6.4%)'],
    answer: 2,
    explanation: '헤드라인 PPI는 예상치 0.7%를 크게 웃돈 +1.1%로 발표되어 시장에 부정적으로 작용했다. 코어 PPI는 +0.4%로 예상과 부합, 연율 PPI는 +6.5%(예상 6.4%)였다.',
    source: '"헤드라인이 PPI 1.1% 예상 0.7이었는데 높아졌죠. 코어 PPI도 0.4로 예상과 부합하고… 이거는 기름값이 올라와서 그런 건데"'
  },
  {
    id: 2, type: 'ox', difficulty: '쉬움',
    question: '트럼프의 이란 타격 실행 취소 소식에 반도체주가 급등했다.',
    answer: 'O',
    explanation: '이란 타격 결정으로 폭락했던 시장이 타격 실행 취소 소식에 폭발적으로 반등했고, 특히 반도체주가 급등했다.',
    source: '"이란 타격 실행을 취소하겠다는 소식에 반도체 주가 급등했습니다" / "트럼프의 이란 폭격 전격 취소에 반도체주 급등"'
  },
  {
    id: 3, type: 'mc', difficulty: '보통',
    question: 'PPI 상승이 연준이 가장 중시하는 PCE 지표에 반영되기까지 걸리는 시차는 약 얼마라고 설명했는가?',
    options: ['약 1주일', '약 1개월', '약 3개월', '약 1년'],
    answer: 2,
    explanation: '기업들이 높아진 원가를 소비자에게 전가하는 데 약 3개월이 걸리므로, PPI와 PCE 사이에는 약 3개월의 지연효과(시차)가 존재한다. 지금 유가가 오르면 9~10월쯤 타격이 온다고 설명했다.',
    source: '"PPI하고 PCE의 차이가 한 3개월 정도 됩니다… 원가를 소비자들한테 전달을 시키거든요. 그게 한 3개월 정도 걸리거든요" / "지금은 타격감이 없어요. 그런데 9월 정도는 타격감이 올 겁니다. 지연효과라는 거죠"'
  },
  {
    id: 4, type: 'mc', difficulty: '보통',
    question: '내일 상장하는 SpaceX의 IPO 공모가는 얼마로 책정되었는가?',
    options: ['$100', '$135', '$200', '$300'],
    answer: 1,
    explanation: 'SpaceX IPO 공모가는 $135로 책정되었다. 진행자는 이보다 훨씬 높아져 200불 이상, 300불까지도 올라갈 것으로 전망했다.',
    source: '"내일 스페이스X IPO 나왔는데 가격은 135불로 책정이 됐습니다. 이것보다는 높아지겠죠 훨씬. 200불 이상은 올라갈 거예요. 300불 이렇게"'
  },
  {
    id: 5, type: 'short', difficulty: '쉬움',
    question: "'333 법칙'에 따르면, SpaceX에 총 1억 원을 투자할 계획일 때 첫 진입 금액은 약 얼마인가? (숫자로, 예: 5천만원)",
    answer: ['3천만원', '3천만 원', '3천만', '3000만원', '3000만 원', '3000만', '30000000', '3,000만원', '3,000만'],

    source: '"만약에 1억 정도 스페이스에 투자하고 싶다 그러면은 3천만원 정도 먼저 들어가는 겁니다… 333 법칙이 그런 거죠"'
  },
  {
    id: 6, type: 'mc', difficulty: '보통',
    question: '이날 필라델피아 반도체지수(PHLX Chip Index)의 상승률과 그 의미로 옳은 것은?',
    options: ['+4.5%, 연중 최대 상승', '+7.9%, 2025년 4월 이후 최대 일간 상승', '+10%, 사상 최대 상승', '+2.5%, 소폭 반등'],
    answer: 1,
    explanation: '필라델피아 반도체지수는 7.9% 급등하며 2025년 4월 이후 최대 일간 상승폭을 기록했다. 다만 "하루에 7.9%씩 움직이는 변동성은 올라가도 불안하다"는 경고도 함께였다.',
    source: '"반도체 주가 7.9% 정도… 하루에 7.9% 올라가는 거예요. 변동성이 크면 올라가도 불안해요" / "PHLX CHIP INDEX SOARS 7.9%, BIGGEST DAILY GAIN SINCE APRIL 2025"'
  },
  {
    id: 7, type: 'short', difficulty: '보통',
    question: '데이빗형님 30대 그룹에 신규 진입한 BNPL(Buy Now, Pay Later) 기업의 이름은? (영문 또는 한글)',
    answer: ['sezzle', 'sezl', '시즐', '세즐', '시즈'],
    answerDisplay: 'Sezzle (SEZL, 시즐)',
    explanation: 'Sezzle은 6주간 4회 분할·무이자 BNPL 서비스 기업으로, 고금리 환경에서 동종 업체 중 유일하게 번창하고 있어 30대 그룹에 신규 편입됐다. 2023년 흑자전환 후 LTM 영업마진 59.5%, ROC 66.4%로 피어 대비 압도적이다.',
    source: '"데이빗형님 30대 신규 진입기업을 소개를 해드립니다. Sezzle입니다. Buy now, pay later인데… 6주 동안에 이자를 안 물리는 거예요… 유일하게 이것만이 사업이 잘 되고 있어요"'

    options: [
      '거래량이 너무 적어서',
      '흑자전환 1년 반밖에 안 되어 DCF 산출이 불가능해서',
      '나스닥 상장 요건을 충족하지 못해서',

  {

    answer: 2,
    explanation: '실적 자체는 예상을 상회했지만 클라우드 소프트웨어 매출이 기대에 미치지 못했고, AI 투자 자금 조달을 위한 200억 달러 규모의 자금조달 계획("빚내서 또 사네")이 겹치며 10% 급락했다. 다만 전체 펀더멘털에는 문제가 없다고 평가했다.',
    source: '"실적은 예상 상회했으나 클라우드 소프트웨어 매출이 기대치 못함. 그 다음에 AI 투자 자금 조달을 위해서 200억 불 달러 규모의 자금 조달… 이것 때문에 떨어진 거예요. 전체 펀더멘털은 문제가 없습니다"'
  },
  {
    id: 10, type: 'ox', difficulty: '어려움',
    question: '진행자는 2027년이 AI 설비투자의 정점(맥스)이 될 것으로 예상하며, 2026년 말~2027년 초 상당한 조정 가능성을 언급했다.',
    answer: 'O',
    explanation: '주요 미국 기업의 AI 설비투자 증가율 둔화 등을 근거로 2027년이 AI 투자의 맥스가 될 것으로 예상했고, 2026년 말부터 2027년 초에 상당한 코렉션(조정)이 올 가능성을 경고하며 "2027년은 올해처럼 생각하면 안 된다"고 했다.',
    source: '"예상은 2027년이 AI 투자의 맥스가 되거든요. 그러면은 2026년 말부터 2027년 초에 상당한 코렉션이 있을 가능성이… 2027년은 올해처럼 생각하시면 안 된다"'
  }
];

const TOTAL = QUIZ_DATA.length;
let state = { solved: 0, correct: 0 };

const quizEl = document.getElementById('quiz');
const bSolved = document.getElementById('bSolved');
const bCorrect = document.getElementById('bCorrect');
const bRate = document.getElementById('bRate');
const pbar = document.getElementById('pbar');

const DIFF_CLASS = { '쉬움': 'd1', '보통': 'd2', '어려움': 'd3' };
const TYPE_LABEL = { mc: '객관식', short: '단답형', ox: 'OX' };
const KEYS = ['A', 'B', 'C', 'D'];

function render() {
  quizEl.innerHTML = '';
  QUIZ_DATA.forEach(q => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = 'q' + q.id;

    let body = '';
    if (q.type === 'mc') {
      body = `<div class="opts">` + q.options.map((opt, i) =>
        `<button class="opt" data-i="${i}"><span class="key">${KEYS[i]}</span><span>${opt}</span><span class="mark-badge"></span></button>`
      ).join('') + `</div>`;
    } else if (q.type === 'ox') {
      body = `<div class="ox-row">
        <button class="opt" data-v="O"><span>O</span><span class="mark-badge"></span></button>
        <button class="opt" data-v="X"><span>X</span><span class="mark-badge"></span></button>
      </div>`;
    } else {
      body = `<div class="short-row">
        <input type="text" placeholder="정답을 입력하세요" maxlength="40" aria-label="정답 입력">
        <button class="submit-btn">제출</button>
      </div>
      <div class="short-result"></div>`;
    }

    card.innerHTML = `
      <div class="q-top">
        <span class="q-num">Q${q.id}</span>
        <span class="badge type">${TYPE_LABEL[q.type]}</span>
        <span class="badge ${DIFF_CLASS[q.difficulty]}">${q.difficulty}</span>
      </div>
      <div class="q-text">${q.question}</div>
      ${body}
      <div class="expl">
        <div class="ex-t">해설</div>
        <div>${q.explanation}</div>
        <span class="src"><b>원문 근거</b> — ${q.source}</span>
      </div>`;
    quizEl.appendChild(card);
    bind(card, q);
  });
}

function bind(card, q) {
  if (q.type === 'mc') {
    card.querySelectorAll('.opt').forEach(btn => {
      btn.addEventListener('click', () => {
        const i = parseInt(btn.dataset.i, 10);
        const isOk = i === q.answer;
        card.querySelectorAll('.opt').forEach(b => {
          b.disabled = true;
          const bi = parseInt(b.dataset.i, 10);
          if (bi === q.answer) {
            b.classList.add('correct');
            b.querySelector('.mark-badge').textContent = (isOk && bi === i) ? '✓ 정답!' : '✓ 정답';
          }
          if (!isOk && bi === i) {
            b.classList.add('wrong');
            b.querySelector('.mark-badge').textContent = '✗ 오답';
          }
        });
        finish(card, isOk);
      });
    });
  } else if (q.type === 'ox') {
    card.querySelectorAll('.opt').forEach(btn => {
      btn.addEventListener('click', () => {
        const v = btn.dataset.v;
        const isOk = v === q.answer;
        card.querySelectorAll('.opt').forEach(b => {
          b.disabled = true;
          if (b.dataset.v === q.answer) {
            b.classList.add('correct');
            b.querySelector('.mark-badge').textContent = '✓ 정답';
          }
          if (!isOk && b.dataset.v === v) {
            b.classList.add('wrong');
            b.querySelector('.mark-badge').textContent = '✗ 오답';
          }
        });
        finish(card, isOk);
      });
    });
  } else {
    const input = card.querySelector('input');
    const btn = card.querySelector('.submit-btn');
    const result = card.querySelector('.short-result');
    const submit = () => {
      const raw = input.value.trim();
      if (!raw) { input.focus(); return; }
      const norm = raw.toLowerCase().replace(/[\s,\.·]/g, '');
      const isOk = q.answer.some(a => {
        const an = a.toLowerCase().replace(/[\s,\.·]/g, '');
        return norm === an || norm.includes(an);
      });
      input.disabled = true; btn.disabled = true;
      result.classList.add(isOk ? 'ok' : 'no');
      result.textContent = isOk
        ? `✓ 정답! — ${q.answerDisplay}`
        : `✗ 오답 — 정답: ${q.answerDisplay}`;
      finish(card, isOk);
    };
    btn.addEventListener('click', submit);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
  }
}

function finish(card, isOk) {
  card.querySelector('.expl').classList.add('show');
  state.solved++;
  if (isOk) state.correct++;
  updateBoard();
  if (state.solved === TOTAL) setTimeout(showFinal, 650);
}

function updateBoard() {
  bSolved.textContent = state.solved;
  bCorrect.textContent = state.correct;
  const rate = state.solved === 0 ? 0 : Math.round((state.correct / state.solved) * 100);
  bRate.textContent = rate + '%';
  pbar.style.width = (state.solved / TOTAL) * 100 + '%';
  pbar.style.backgroundColor = rate < 40 ? '#dc2626' : (rate < 70 ? '#f59e0b' : '#16a34a');
}

function showFinal() {
  const score = state.correct * 10;
  const rate = Math.round((state.correct / TOTAL) * 100);
  let grade, msg;
  if (rate >= 90) { grade = 'A'; msg = '완벽합니다! PPI 지연효과부터 Sezzle DCF 논리까지 — 큰 배의 선장이 될 자격이 충분합니다. 🚢'; }
  else if (rate >= 70) { grade = 'B'; msg = '훌륭해요! 핵심 흐름은 확실히 잡으셨습니다. 틀린 문제의 해설만 한 번 더 읽으면 완벽합니다.'; }
  else if (rate >= 50) { grade = 'C'; msg = '절반 이상 맞히셨어요. PPI→PCE 지연효과와 SpaceX 락업 일정 부분을 리포트에서 다시 복습해 보세요.'; }
  else { grade = 'D'; msg = '괜찮습니다 — 처음부터 다 알고 시작하는 사람은 없으니까요. 분석 리포트를 먼저 읽고 다시 도전해 보세요!'; }
  document.getElementById('fGrade').textContent = grade;
  document.getElementById('fScore').textContent = score + '점';
  document.getElementById('fDetail').textContent = `${TOTAL}문제 중 ${state.correct}개 정답 (정답률 ${rate}%)`;
  document.getElementById('fMsg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}

document.getElementById('retryBtn').addEventListener('click', () => {
  state = { solved: 0, correct: 0 };
  updateBoard();
  document.getElementById('overlay').classList.remove('show');
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});
document.getElementById('closeBtn').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
});

render();
updateBoard();
</script>
</body>
</html>
