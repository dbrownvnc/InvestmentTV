<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시장 포커스 퀴즈 — 잔인한 5월 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #fafafa;
    --text: #1a1a1a;
    --text2: #777777;
    --accent: #e11d48;
    --accent2: #f43f5e;
    --border: #e5e5e5;
    --correct: #16a34a;
    --wrong: #dc2626;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 80px;
    line-height: 1.7;
  }

  /* STICKY SCORE BAR */
  #scorebar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #fff;
    border-bottom: 3px solid var(--accent);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .score-item { font-size: 12px; color: var(--text2); }
  .score-item strong { font-size: 15px; color: var(--text); font-family: 'Playfair Display', serif; }
  .score-item span.label { margin-right: 4px; }
  .progress-bar-wrap {
    flex: 1;
    background: var(--border);
    height: 6px;
    border-radius: 3px;
    min-width: 80px;
    overflow: hidden;
  }
  #progressBar {
    height: 100%;
    width: 0%;
    border-radius: 3px;
    background: var(--accent);
    transition: width 0.4s ease, background 0.4s ease;
  }
  #rateText { font-size: 12px; font-weight: 700; color: var(--accent); min-width: 40px; }

  /* HERO */
  .hero {
    padding: 36px 0 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .hero-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 10px; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(26px, 7vw, 38px); font-weight: 900; line-height: 1.15; margin-bottom: 10px; }
  .hero h1 span { color: var(--accent); }
  .hero p { font-size: 13px; color: var(--text2); }

  /* QUESTION CARD */
  .q-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    transition: border-color 0.3s;
  }
  .q-card.solved-correct { border-color: #86efac; }
  .q-card.solved-wrong { border-color: #fca5a5; }

  .q-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }
  .q-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    min-width: 32px;
  }
  .q-type-badge, .q-diff-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    letter-spacing: 0.5px;
  }
  .q-type-badge { background: #f3f4f6; color: #6b7280; }
  .q-diff-badge.easy { background: #dcfce7; color: var(--correct); }
  .q-diff-badge.medium { background: #fef9c3; color: #a16207; }
  .q-diff-badge.hard { background: #fee2e2; color: var(--wrong); }

  .q-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.7;
    margin-bottom: 16px;
    color: var(--text);
  }

  /* OPTIONS */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    width: 100%;
    text-align: left;
    background: #fff;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 11px 14px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    color: var(--text);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.1s;
    line-height: 1.5;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #fff1f2; transform: translateX(3px); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct-ans { background: #dcfce7 !important; border-color: var(--correct) !important; color: var(--correct); font-weight: 700; }
  .opt-btn.wrong-ans { background: #fee2e2 !important; border-color: var(--wrong) !important; color: var(--wrong); }
  .opt-btn .badge-inline {
    float: right;
    font-size: 11px;
    font-weight: 700;
    padding: 1px 8px;
    border-radius: 4px;
    margin-left: 8px;
  }
  .badge-correct { background: var(--correct); color: #fff; }
  .badge-wrong { background: var(--wrong); color: #fff; }

  /* OX BUTTONS */
  .ox-wrap { display: flex; gap: 12px; }
  .ox-btn {
    flex: 1;
    padding: 18px;
    font-size: 28px;
    font-weight: 900;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: #fff;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    transition: all 0.2s;
  }
  .ox-btn:hover:not(:disabled) { transform: scale(1.05); }
  .ox-btn:disabled { cursor: default; }
  .ox-btn.correct-ans { background: #dcfce7; border-color: var(--correct); }
  .ox-btn.wrong-ans { background: #fee2e2; border-color: var(--wrong); }

  /* SHORT ANSWER */
  .short-wrap { display: flex; gap: 8px; margin-top: 4px; }
  .short-input {
    flex: 1;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }
  .short-input:focus { border-color: var(--accent); }
  .short-input:disabled { background: var(--bg2); }
  .submit-btn {
    padding: 10px 18px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .submit-btn:hover { background: var(--accent2); }
  .submit-btn:disabled { background: var(--border); color: var(--text2); cursor: default; }
  .short-hint { font-size: 12px; color: var(--text2); margin-top: 6px; font-style: italic; }

  /* EXPLANATION */
  .explanation {
    margin-top: 14px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px;
    display: none;
    animation: slideDown 0.3s ease;
  }
  .explanation.show { display: block; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }
  .exp-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 6px; }
  .exp-text { font-size: 13px; color: var(--text); line-height: 1.7; }
  .exp-source { font-size: 11px; color: var(--text2); margin-top: 6px; border-top: 1px solid var(--border); padding-top: 6px; }

  /* RESULT MODAL */
  #resultModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  #resultModal.show { display: flex; }
  .result-card {
    background: #fff;
    border-radius: 16px;
    padding: 36px 28px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    animation: popIn 0.4s cubic-bezier(.36,.07,.19,.97);
  }
  @keyframes popIn { from { transform:scale(0.8); opacity:0; } to { transform:scale(1); opacity:1; } }
  .result-emoji { font-size: 52px; margin-bottom: 12px; }
  .result-score { font-family: 'Playfair Display', serif; font-size: 52px; font-weight: 900; color: var(--accent); line-height: 1; }
  .result-grade { font-size: 24px; font-weight: 700; margin: 8px 0; }
  .result-msg { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
  .btn-retry {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-retry:hover { background: var(--accent2); }
</style>
</head>
<body>

<!-- STICKY SCORE BAR -->
<div id="scorebar">
  <div class="score-item"><span class="label">푼 문제</span><strong id="solvedCount">0</strong> / 10</div>
  <div class="score-item"><span class="label">정답</span><strong id="correctCount">0</strong></div>

</div>

<!-- HERO -->

let state = { solved: 0, correct: 0 };
let solvedMap = {}; // id -> 'correct' | 'wrong'

function renderQuiz() {
  const area = document.getElementById('quizArea');
  area.innerHTML = '';
  QUIZ_DATA.forEach(q => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${q.id}`;
    card.innerHTML = buildCardHTML(q);
    area.appendChild(card);
    attachEvents(card, q);
  });
}

function buildCardHTML(q) {
  const diffLabel = q.difficulty === 'easy' ? '쉬움' : q.difficulty === 'medium' ? '보통' : '어려움';
  const diffClass = q.difficulty;
  const typeLabel = q.type === 'multiple' ? '객관식' : q.type === 'ox' ? 'O/X' : '단답형';

  let optionsHTML = '';
  if (q.type === 'multiple') {
    optionsHTML = `<div class="options">` + q.options.map((o, i) =>
      `<button class="opt-btn" data-idx="${i}">${String.fromCharCode(65+i)}. ${o}</button>`
    ).join('') + `</div>`;
  } else if (q.type === 'ox') {
    optionsHTML = `<div class="ox-wrap">
      <button class="ox-btn" data-idx="0">O</button>
      <button class="ox-btn" data-idx="1">X</button>
    </div>`;
  } else {
    optionsHTML = `<div class="short-wrap">
      <input type="text" class="short-input" placeholder="답을 입력하세요..." maxlength="20">
      <button class="submit-btn">제출</button>
    </div>
    <div class="short-hint">힌트: 숫자만 입력하세요</div>`;
  }

  return `
    <div class="q-header">
      <div class="q-num">${q.id}</div>
      <span class="q-type-badge">${typeLabel}</span>
      <span class="q-diff-badge ${diffClass}">${diffLabel}</span>
    </div>
    <div class="q-text">${q.question}</div>
    ${optionsHTML}
    <div class="explanation" id="exp-${q.id}">
      <div class="exp-label">📖 해설</div>
      <div class="exp-text">${q.explanation}</div>
      <div class="exp-source">📻 방송 근거: "${q.source}"</div>
    </div>
  `;
}

function attachEvents(card, q) {
  if (q.type === 'multiple') {
    card.querySelectorAll('.opt-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (solvedMap[q.id]) return;
        const chosen = +btn.dataset.idx;
        judgeAnswer(q, chosen, card, btn);
      });
    });
  } else if (q.type === 'ox') {
    card.querySelectorAll('.ox-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (solvedMap[q.id]) return;
        const chosen = +btn.dataset.idx;
        judgeAnswer(q, chosen, card, btn);
      });
    });
  } else {
    const input = card.querySelector('.short-input');
    const submitBtn = card.querySelector('.submit-btn');
    submitBtn.addEventListener('click', () => {
      if (solvedMap[q.id]) return;
      const val = input.value.trim();
      if (!val) return;
      const isCorrect = q.keywords.some(kw => val === kw || val.replace(/\s/g, '') === kw.replace(/\s/g, ''));
      judgeShort(q, isCorrect, card, input, submitBtn);
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitBtn.click();
    });
  }
}

function judgeAnswer(q, chosen, card, clickedBtn) {
  const isCorrect = chosen === q.answer;
  solvedMap[q.id] = isCorrect ? 'correct' : 'wrong';
  state.solved++;
  if (isCorrect) state.correct++;

  // Disable all buttons
  const allBtns = card.querySelectorAll('.opt-btn, .ox-btn');
  allBtns.forEach(b => {
    b.disabled = true;
    const idx = +b.dataset.idx;
    if (idx === q.answer) {
      b.classList.add('correct-ans');
      b.innerHTML += ` <span class="badge-inline badge-correct">✓ 정답</span>`;
    } else if (b === clickedBtn && !isCorrect) {
      b.classList.add('wrong-ans');
      b.innerHTML += ` <span class="badge-inline badge-wrong">✗ 오답</span>`;
    }
  });

  card.classList.add(isCorrect ? 'solved-correct' : 'solved-wrong');
  showExplanation(q.id);
  updateScoreBar();
  checkComplete();
}

function judgeShort(q, isCorrect, card, input, submitBtn) {
  solvedMap[q.id] = isCorrect ? 'correct' : 'wrong';
  state.solved++;
  if (isCorrect) state.correct++;

  input.disabled = true;
  submitBtn.disabled = true;

  if (isCorrect) {
    input.style.borderColor = 'var(--correct)';
    input.style.background = '#dcfce7';
    input.style.color = 'var(--correct)';
    input.style.fontWeight = '700';
  } else {
    input.style.borderColor = 'var(--wrong)';
    input.style.background = '#fee2e2';
    input.style.color = 'var(--wrong)';
    // Show correct answer
    const hint = card.querySelector('.short-hint');
    hint.textContent = `정답: ${q.answer}`;
    hint.style.color = 'var(--correct)';
    hint.style.fontWeight = '700';
  }

  card.classList.add(isCorrect ? 'solved-correct' : 'solved-wrong');
  showExplanation(q.id);
  updateScoreBar();
  checkComplete();
}

function showExplanation(id) {
  const el = document.getElementById(`exp-${id}`);
  if (el) el.classList.add('show');
}

function updateScoreBar() {
  document.getElementById('solvedCount').textContent = state.solved;
  document.getElementById('correctCount').textContent = state.correct;
  const rate = state.solved > 0 ? Math.round(state.correct / state.solved * 100) : 0;
  document.getElementById('rateText').textContent = rate + '%';
  const bar = document.getElementById('progressBar');
  bar.style.width = (state.solved / 10 * 100) + '%';
  if (rate < 40) bar.style.background = '#dc2626';
  else if (rate < 70) bar.style.background = '#ea580c';
  else bar.style.background = '#16a34a';
}

function checkComplete() {
  if (state.solved === 10) {
    setTimeout(showResult, 600);
  }
}

function showResult() {
  const score = state.correct;
  let grade, emoji, msg;
  if (score >= 9) { grade = 'A+'; emoji = '🏆'; msg = '완벽합니다! 시장을 꿰뚫는 투자자의 눈을 가지셨군요.'; }
  else if (score >= 7) { grade = 'A'; emoji = '🎯'; msg = '훌륭합니다! 핵심 내용을 잘 이해하셨습니다.'; }
  else if (score >= 5) { grade = 'B'; emoji = '📊'; msg = '양호합니다. 복습을 통해 더 완성도를 높여보세요.'; }
  else if (score >= 3) { grade = 'C'; emoji = '📚'; msg = '방송을 다시 한번 꼼꼼히 보시길 권장합니다.'; }
  else { grade = 'D'; emoji = '💪'; msg = '괜찮아요. 다시 도전하면 반드시 올라갑니다!'; }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultScore').textContent = `${score} / 10`;
  document.getElementById('resultGrade').textContent = `등급: ${grade}`;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultModal').classList.add('show');
}

function retryQuiz() {
  state = { solved: 0, correct: 0 };
  solvedMap = {};
  document.getElementById('resultModal').classList.remove('show');
  updateScoreBar();
  renderQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// INIT
renderQuiz();
</script>
</body>
</html>
