<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>퀴즈 — 하반기 인수합병</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600&family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-alt: #fafafa;
    --text: #1a1a1a;
    --text-sub: #777777;
    --accent: #e11d48;
    --accent-2: #f43f5e;
    --border: #e5e5e5;
    --green: #16a34a;
    --green-bg: #ecfdf3;
    --red: #dc2626;
    --red-bg: #fef2f2;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 680px; margin: 0 auto; padding: 0 18px 60px; }

  /* Sticky scoreboard */
  .scoreboard {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(6px);
    border-bottom: 1px solid var(--border);
    padding: 12px 18px;
    margin: 0 -18px 0;
  }
  .score-inner { max-width: 644px; margin: 0 auto; }
  .score-stats {
    display: flex;
    justify-content: space-between;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text-sub);
    margin-bottom: 8px;
  }
  .score-stats b { color: var(--text); font-size: 13.5px; }
  .score-stats .rate { color: var(--accent); }
  .progress-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--red);
    transition: width 0.4s ease, background 0.4s ease;
    border-radius: 3px;
  }

  .header {
    padding: 30px 0 24px;
  }
  .eyebrow {
    font-size: 11.5px;
    letter-spacing: 0.16em;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-weight: 700;
    margin-top: 12px;
    line-height: 1.3;
  }
  .header p { font-size: 14px; color: var(--text-sub); margin-top: 8px; }

  .q-card {
    border: 1px solid var(--border);
    padding: 22px 20px;
    margin-bottom: 16px;
    background: #fff;
  }
  .q-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .q-num {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 15px;
    color: var(--accent);
  }
  .badge {
    font-size: 10.5px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    letter-spacing: 0.02em;
  }
  .badge.type { background: #f3f4f6; color: #4b5563; }
  .badge.easy { background: #ecfdf3; color: var(--green); }
  .badge.medium { background: #fff7ed; color: #d97706; }
  .badge.hard { background: var(--red-bg); color: var(--red); }

  .q-text {
    font-size: 15.5px;
    font-weight: 600;
    margin-bottom: 16px;
    line-height: 1.55;
  }

  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt-btn {
    text-align: left;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    background: #fff;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    border-radius: 6px;
    transition: border-color 0.15s ease, background 0.15s ease;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { background: var(--green-bg); border-color: var(--green); color: #14532d; }
  .opt-btn.wrong { background: var(--red-bg); border-color: var(--red); color: #7f1d1d; }
  .opt-btn .mark { font-size: 12px; font-weight: 700; white-space: nowrap; }
  .opt-btn.correct .mark { color: var(--green); }
  .opt-btn.wrong .mark { color: var(--red); }

  .ox-row { display: flex; gap: 10px; }
  .ox-btn {
    flex: 1;
    padding: 16px;
    font-size: 22px;
    font-weight: 800;
    font-family: 'Playfair Display', serif;
    border: 1.5px solid var(--border);
    background: #fff;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s ease;
  }
  .ox-btn:disabled { cursor: default; }
  .ox-btn.correct { background: var(--green-bg); border-color: var(--green); color: var(--green); }
  .ox-btn.wrong { background: var(--red-bg); border-color: var(--red); color: var(--red); }

  .sa-row { display: flex; gap: 8px; }
  .sa-input {
    flex: 1;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    font-size: 14px;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .sa-input:focus { outline: none; border-color: var(--accent); }
  .sa-input:disabled { background: #f9fafb; }
  .sa-submit {
    padding: 12px 18px;
    background: var(--text);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13.5px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
  }
  .sa-submit:disabled { background: #d1d5db; cursor: default; }
  .sa-feedback {
    margin-top: 10px;
    font-size: 13.5px;
    font-weight: 700;
    display: none;
  }
  .sa-feedback.show { display: block; }
  .sa-feedback.correct { color: var(--green); }
  .sa-feedback.wrong { color: var(--red); }

  .explanation {
    margin-top: 14px;
    padding: 14px 16px;
    background: var(--bg-alt);
    border-left: 3px solid var(--accent);
    font-size: 13.5px;
    color: #3a3a3a;
    line-height: 1.6;
    display: none;
  }
  .explanation.show { display: block; animation: slideDown 0.3s ease; }
  .explanation b { color: var(--text); }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Final modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26,26,26,0.55);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-card {
    background: #fff;
    max-width: 380px;
    width: 100%;
    padding: 36px 28px;
    text-align: center;
    border-radius: 10px;
  }
  .modal-card .grade {
    font-family: 'Playfair Display', serif;
    font-size: 64px;
    font-weight: 800;
    color: var(--accent);
    line-height: 1;
  }
  .modal-card .score-line {
    font-size: 15px;
    color: var(--text-sub);
    margin: 14px 0 6px;
  }
  .modal-card .msg {
    font-size: 14px;
    color: #3a3a3a;
    margin: 14px 0 22px;
    line-height: 1.6;
  }
  .retry-btn {
    padding: 13px 28px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14.5px;
    font-weight: 700;
    cursor: pointer;
  }

  footer { text-align: center; font-size: 11px; color: #b0b0b0; padding: 30px 0 10px; }
</style>
</head>
<body>

<div class="scoreboard">
  <div class="score-inner">
    <div class="score-stats">
      <span>푼 문제 <b id="solvedCount">0</b> / 10</span>
      <span>맞힌 문제 <b id="correctCount">0</b></span>
      <span class="rate">정답률 <b id="rateCount">0%</b></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>
</div>

<div class="page">
  <div class="header">
    <div class="eyebrow">QUIZ · 이해도 확인</div>
    <h1>하반기 인수합병 — 10문제</h1>
    <p>원본 방송 내용을 바탕으로 출제되었습니다. 보기를 클릭하면 바로 채점됩니다.</p>
  </div>

  <div id="quizContainer"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <div class="grade" id="finalGrade">A</div>
    <div class="score-line" id="finalScoreLine">10문제 중 10문제 정답</div>
    <div class="msg" id="finalMsg"></div>
    <button class="retry-btn" id="retryBtn">다시 풀기</button>
  </div>
</div>

<footer>투자는인생TV MEMBER BRIEFING · 원본 자막 기반 출제</footer>

<script>
const QUIZ_DATA = [
  {
    id: 1, type: 'mc', difficulty: 'easy',
    question: '진행자가 이번 방송을 재개하기까지 방송을 쉬었던 기간은?',
    options: ['1주', '2주', '3주', '한 달'],
    answer: 1,
    explanation: '진행자는 "여러분들이 2주 동안 제가 방송을 안해서 여러가지 불안한 심기가 있는 것 같고"라고 말하며 2주간의 공백을 직접 언급했습니다.'
  },
  {
    id: 2, type: 'mc', difficulty: 'medium',
    question: '진행자가 예상하는 하반기 M&A 대상 기업의 공통 특징은?',
    options: [
      '매출과 이익이 모두 정체된 기업',
      '매출은 늘지만 EPS가 부진한 기업',
      '이미 시장을 지배한 대기업',
      '배당을 많이 주는 안정적 기업'
    ],
    answer: 1,
    explanation: '"매출은 올라가는데 EPS는 여전히 마이너스인 회사... 이런 회사들이 M&A 대상이 많이 될 것 같습니다"라는 발언에서 확인할 수 있습니다.'
  },
  {
    id: 3, type: 'ox', difficulty: 'medium',
    question: '진행자는 스페이스X의 자산·시총 확대에 따라 테슬라 관련 사업이 인수합병 대상이 될 가능성도 있다고 언급했다.',
    answer: true,
    explanation: '"테슬라가 아무래도 스페이스X가 자산 규모가 커지고 시총이 커지게 되면 아마 인수합병 될 가능성도 조금은 있는 것 같아요"라는 발언이 있었습니다.'
  },
  {
    id: 4, type: 'mc', difficulty: 'easy',
    question: '드론·우주기술 관련 다크호스 종목으로 언급된 티커는?',
    options: ['LMT', 'AVAV', 'TSLA', 'RTX'],
    answer: 1,
    explanation: '"AV AV라는 티커로 지금 3장이 되어 있는 회사가 있습니다"라며 AVAV(AeroVironment)를 구체적으로 언급했습니다.'
  },
  {
    id: 5, type: 'sa', difficulty: 'medium',
    question: 'AVAV 티커를 사용하는 회사의 정식 명칭(영문)을 쓰시오.',
    answer: 'aerovironment',
    acceptable: ['aerovironment', 'aero environment', 'aerial environment'],
    explanation: '진행자는 "Aero Environment"(AeroVironment)라는 드론 테크놀로지·소프트웨어·레이저 커뮤니케이션 기업이라고 소개했습니다.'
  },
  {
    id: 6, type: 'mc', difficulty: 'medium',
    question: 'AVAV의 최근 1년 매출 성장률로 언급된 수치는?',
    options: ['40~50%', '80~90%', '140~150%', '200% 이상'],
    answer: 2,
    explanation: '"웨브누 같은 경우는 140% 150% 1년에 늘어나는데 EPS가 그렇게 좋지가 않아요"라는 발언에서 확인됩니다.'
  },
  {
    id: 7, type: 'sa', difficulty: 'hard',
    question: 'AVAV가 실적을 발표하며 가이던스를 상향한 날짜는? (월/일로 답하시오)',
    answer: '6/30',
    acceptable: ['6/30', '6월 30일', '06/30', '6-30'],
    explanation: '"6월 30일 출적 발표가 있었는데 예상시적으로 상향을 했습니다"라고 언급되었습니다.'
  },
  {
    id: 8, type: 'ox', difficulty: 'easy',
    question: '진행자는 AVAV에 대한 투자를 소액 투자자에게도 적극 권장했다.',
    answer: false,
    explanation: '"투자 리스크는 크기 때문에 소액 투자자는 투자를 안 했으면 좋겠고, 몇 억씩 가지고 계신 분들 중 일부만 조금 투자를 해보자"라고 명확히 제한을 뒀습니다.'
  },
  {
    id: 9, type: 'mc', difficulty: 'hard',
    question: '락히드마틴(Lockheed Martin)의 성장 속도가 더딘 이유로 언급된 것은?',
    options: [
      '기술력이 뒤처져서',
      'government contract 의존도가 높아서',
      '드론 사업을 하지 않아서',
      '해외 매출 비중이 낮아서'
    ],
    answer: 1,
    explanation: '"락키드 마케팅의 성장 속도는 굉장히 더딥니다. government contract이기 때문에"라고 이유를 밝혔습니다.'
  },
  {
    id: 10, type: 'mc', difficulty: 'medium',
    question: '작년 대비 미국 국방비 증가율로 언급된 수치는?',
    options: ['10% 이상', '30% 이상', '50% 이상', '100% 이상'],
    answer: 2,
    explanation: '"작년에 비해서 국방비가 50% 이상 늘어난 상황"이라고 언급되었습니다.'
  }
];

let state = { solved: 0, correct: 0 };
const container = document.getElementById('quizContainer');

const diffLabel = { easy: '쉬움', medium: '보통', hard: '어려움' };
const typeLabel = { mc: '객관식', sa: '단답형', ox: 'OX' };

function normalize(str) {
  return str.toLowerCase().replace(/\s+/g, '').trim();
}

function renderQuestion(q) {
  const card = document.createElement('div');
  card.className = 'q-card';

  const top = document.createElement('div');
  top.className = 'q-top';
  top.innerHTML = `
    <span class="q-num">Q${q.id}</span>
    <span class="badge type">${typeLabel[q.type]}</span>
    <span class="badge ${q.difficulty}">${diffLabel[q.difficulty]}</span>
  `;
  card.appendChild(top);

  const qText = document.createElement('div');
  qText.className = 'q-text';
  qText.textContent = q.question;
  card.appendChild(qText);

  const explanation = document.createElement('div');
  explanation.className = 'explanation';
  explanation.innerHTML = `<b>해설</b><br>${q.explanation}`;

  function finalize(isCorrect) {
    state.solved++;
    if (isCorrect) state.correct++;
    explanation.classList.add('show');
    updateScoreboard();
    if (state.solved === QUIZ_DATA.length) {
      setTimeout(showFinalModal, 400);
    }
  }

  if (q.type === 'mc') {
    const optsWrap = document.createElement('div');
    optsWrap.className = 'options';
    q.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.innerHTML = `<span>${opt}</span><span class="mark"></span>`;
      btn.addEventListener('click', () => {
        const buttons = optsWrap.querySelectorAll('.opt-btn');
        const isCorrect = idx === q.answer;
        buttons.forEach((b, i) => {
          b.disabled = true;
          if (i === q.answer) {
            b.classList.add('correct');
            b.querySelector('.mark').textContent = '✓ 정답!';
          } else if (i === idx && !isCorrect) {
            b.classList.add('wrong');
            b.querySelector('.mark').textContent = '✗ 오답';
          }
        });
        finalize(isCorrect);
      });
      optsWrap.appendChild(btn);
    });
    card.appendChild(optsWrap);
  }

  if (q.type === 'ox') {
    const row = document.createElement('div');
    row.className = 'ox-row';
    [true, false].forEach(val => {
      const btn = document.createElement('button');
      btn.className = 'ox-btn';
      btn.textContent = val ? 'O' : 'X';
      btn.addEventListener('click', () => {
        const buttons = row.querySelectorAll('.ox-btn');
        const isCorrect = val === q.answer;
        buttons.forEach(b => {
          b.disabled = true;
          const bVal = b.textContent === 'O';
          if (bVal === q.answer) b.classList.add('correct');
          else if (bVal === val && !isCorrect) b.classList.add('wrong');
        });
        finalize(isCorrect);
      });
      row.appendChild(btn);
    });
    card.appendChild(row);
  }

  if (q.type === 'sa') {
    const row = document.createElement('div');
    row.className = 'sa-row';
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'sa-input';
    input.placeholder = '답을 입력하세요';
    const submit = document.createElement('button');
    submit.className = 'sa-submit';
    submit.textContent = '제출';
    row.appendChild(input);
    row.appendChild(submit);
    card.appendChild(row);

    const feedback = document.createElement('div');
    feedback.className = 'sa-feedback';
    card.appendChild(feedback);

    function submitAnswer() {
      const val = input.value.trim();
      if (!val) return;
      const norm = normalize(val);
      const accepted = (q.acceptable || [q.answer]).map(normalize);
      const isCorrect = accepted.includes(norm);
      input.disabled = true;
      submit.disabled = true;
      feedback.classList.add('show');
      if (isCorrect) {
        feedback.classList.add('correct');
        feedback.textContent = '✓ 정답!';
      } else {
        feedback.classList.add('wrong');
        feedback.textContent = `✗ 오답 (정답: ${q.answer})`;
      }
      finalize(isCorrect);
    }
    submit.addEventListener('click', submitAnswer);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });
  }

  card.appendChild(explanation);
  return card;
}

function renderAll() {
  container.innerHTML = '';
  QUIZ_DATA.forEach(q => container.appendChild(renderQuestion(q)));
}

function updateScoreboard() {
  document.getElementById('solvedCount').textContent = state.solved;
  document.getElementById('correctCount').textContent = state.correct;
  const rate = state.solved === 0 ? 0 : Math.round((state.correct / state.solved) * 100);
  document.getElementById('rateCount').textContent = rate + '%';
  const fill = document.getElementById('progressFill');
  fill.style.width = (state.solved / QUIZ_DATA.length * 100) + '%';
  if (rate < 40) fill.style.background = 'var(--red)';
  else if (rate < 70) fill.style.background = '#d97706';
  else fill.style.background = 'var(--green)';
}

function showFinalModal() {
  const rate = Math.round((state.correct / QUIZ_DATA.length) * 100);
  let grade, msg;
  if (rate >= 90) { grade = 'A'; msg = '완벽에 가깝습니다! 방송 핵심 내용을 정확히 파악하셨네요.'; }
  else if (rate >= 70) { grade = 'B'; msg = '잘 이해하셨습니다. 몇 가지 디테일만 다시 확인해보세요.'; }
  else if (rate >= 50) { grade = 'C'; msg = '핵심은 파악했지만 세부 수치들을 다시 살펴보면 좋겠습니다.'; }
  else { grade = 'D'; msg = '리포트를 한 번 더 읽고 다시 도전해보세요!'; }

  document.getElementById('finalGrade').textContent = grade;
  document.getElementById('finalScoreLine').textContent = `10문제 중 ${state.correct}문제 정답 · 정답률 ${rate}%`;
  document.getElementById('finalMsg').textContent = msg;
  document.getElementById('modalOverlay').classList.add('show');
}

document.getElementById('retryBtn').addEventListener('click', () => {
  state = { solved: 0, correct: 0 };
  updateScoreboard();
  document.getElementById('modalOverlay').classList.remove('show');
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

renderAll();
updateScoreboard();
</script>
</body>
</html>
